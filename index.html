<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ✏️ 改這裡換掉標籤頁標題 -->
    <title>Quiz</title>
    <style>
        :root {
            --bg:           #0f1117;
            --surface:      #1a1d27;
            --surface2:     #23263a;
            --border:       #2d3148;
            --accent:       #7c6dfa;
            --accent-soft:  rgba(124,109,250,.15);
            --text:         #e8eaf0;
            --muted:        #7a7e9a;
            --correct:      #4caf87;
            --correct-soft: rgba(76,175,135,.15);
            --wrong:        #e05c6e;
            --wrong-soft:   rgba(224,92,110,.15);
            --radius:       14px;
            --transition:   .2s ease;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        #app { width: 100%; max-width: 680px; }

        .screen { display: none; }
        .screen.active { display: block; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
        }

        h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
        h2 { font-size: 1.25rem; font-weight: 600; line-height: 1.5; margin-bottom: 20px; }
        p  { color: var(--muted); font-size: .95rem; line-height: 1.6; }

        #select-screen .subtitle { margin-bottom: 28px; margin-top: 6px; }

        .quiz-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

        .quiz-card {
            background: var(--surface2);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            cursor: pointer;
            transition: border-color var(--transition), background var(--transition);
            user-select: none;
        }
        .quiz-card:hover { border-color: var(--accent); }
        .quiz-card.selected { border-color: var(--accent); background: var(--accent-soft); }
        .quiz-card .name { font-weight: 600; font-size: 1rem; }
        .quiz-card .meta { font-size: .82rem; color: var(--muted); margin-top: 3px; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity var(--transition), transform var(--transition);
        }
        .btn:active { transform: scale(.97); }
        .btn-primary { background: var(--accent); color: #fff; width: 100%; }
        .btn-primary:hover { opacity: .88; }
        .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
        .btn-ghost {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

        .quiz-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 12px;
        }

        .progress-wrap {
            flex: 1;
            height: 6px;
            background: var(--surface2);
            border-radius: 99px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 99px;
            transition: width .4s ease;
        }

        .q-counter { font-size: .82rem; color: var(--muted); white-space: nowrap; }

        .type-badge {
            font-size: .72rem;
            padding: 3px 10px;
            border-radius: 99px;
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 16px;
            display: inline-block;
        }
        .topic-badge {
            font-size: .72rem;
            padding: 3px 10px;
            border-radius: 99px;
            background: var(--surface2);
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 16px;
            margin-left: 8px;
            display: inline-block;
        }

        .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

        .option {
            background: var(--surface2);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            cursor: pointer;
            transition: border-color var(--transition), background var(--transition);
            display: flex;
            align-items: center;
            gap: 14px;
            user-select: none;
        }
        .option:hover:not(.locked) { border-color: var(--accent); }
        .option.selected { border-color: var(--accent); background: var(--accent-soft); }
        .option.correct  { border-color: var(--correct); background: var(--correct-soft); }
        .option.wrong    { border-color: var(--wrong);   background: var(--wrong-soft); }

        .option-key {
            width: 28px; height: 28px;
            border-radius: 7px;
            background: var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: .78rem; font-weight: 700;
            flex-shrink: 0;
            transition: background var(--transition), color var(--transition);
        }
        .option.selected .option-key { background: var(--accent); color: #fff; }
        .option.correct  .option-key { background: var(--correct); color: #fff; }
        .option.wrong    .option-key { background: var(--wrong);   color: #fff; }
        .option-text { font-size: .95rem; line-height: 1.5; }

        .score-ring {
            display: flex; flex-direction: column; align-items: center;
            margin: 28px 0 32px; gap: 6px;
        }
        .score-number { font-size: 3.5rem; font-weight: 800; line-height: 1; }
        .score-label  { color: var(--muted); font-size: .9rem; }

        /* 弱點分析 */
        .weakness-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 28px;
        }
        .weakness-title { font-weight: 700; font-size: 1rem; margin-bottom: 12px; color: var(--accent); }
        .weakness-item {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; font-size: .85rem;
        }
        .weakness-bar-bg { flex: 1; height: 4px; background: var(--border); margin: 0 12px; border-radius: 2px; position: relative; }
        .weakness-bar-fg { height: 100%; background: var(--accent); border-radius: 2px; }
        .weakness-name { width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .weakness-score { width: 40px; text-align: right; font-weight: 600; }

        .result-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
        .result-item {
            background: var(--surface2);
            border-radius: 10px;
            padding: 14px 18px;
            border-left: 4px solid var(--border);
            font-size: .9rem;
        }
        .result-item.ok   { border-color: var(--correct); }
        .result-item.fail { border-color: var(--wrong); }
        .result-item .ri-q { color: var(--muted); font-size: .82rem; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .result-item .ri-topic { font-size: .75rem; color: var(--accent); opacity: 0.8; }
        .result-item .ri-status { font-weight: 600; font-size: .82rem; margin-top: 6px; }
        .result-item.ok   .ri-status { color: var(--correct); }
        .result-item.fail .ri-status { color: var(--wrong); }

        /* 調整按鈕列，讓退出按鈕較短 */
        .quiz-actions { display: flex; gap: 10px; }
        .quiz-actions #exit-btn { flex: 0 0 80px; padding: 12px 0; font-size: 0.9rem; }
        .quiz-actions #next-btn { flex: 1; }

        .btn-row { display: flex; gap: 10px; }
        .btn-row .btn { flex: 1; }

        .toast { text-align: center; padding: 20px; color: var(--muted); }
        .toast.error { color: var(--wrong); }
    </style>
</head>
<body>
<div id="app">

    <!-- ① 選擇題目集 -->
    <div id="select-screen" class="screen card">
        <!-- ✏️ 改這裡換掉主標題與副標題 -->
        <h1>📝 Quiz</h1>
        <p class="subtitle">選擇題目集，然後開始作答</p>
        <div id="quiz-list" class="quiz-list">
            <p class="toast">載入中…</p>
        </div>
        <button id="start-btn" class="btn btn-primary" disabled>開始作答 →</button>
    </div>

    <!-- ② 作答中 -->
    <div id="quiz-screen" class="screen">
        <div class="card">
            <div class="quiz-header">
                <div class="progress-wrap">
                    <div id="progress-bar" class="progress-bar" style="width:0%"></div>
                </div>
                <span id="q-counter" class="q-counter">0 / 0</span>
            </div>
            <div style="display: flex; align-items: baseline;">
                <span id="type-badge" class="type-badge"></span>
                <span id="topic-badge" class="topic-badge"></span>
            </div>
            <h2 id="question-text"></h2>
            <div id="options" class="options"></div>
            <div class="quiz-actions">
                <button id="exit-btn" class="btn btn-ghost">退出</button>
                <button id="next-btn" class="btn btn-primary" disabled>下一題 →</button>
            </div>
        </div>
    </div>

    <!-- ③ 結果 -->
    <div id="result-screen" class="screen card">
        <h1>結果</h1>
        <div class="score-ring">
            <div id="score-number" class="score-number">—</div>
            <div class="score-label">答對題數</div>
        </div>
        <div id="weakness-analysis" class="weakness-card" style="display:none">
            <div class="weakness-title">📊 弱點分析</div>
            <div id="weakness-list"></div>
        </div>
        <div id="result-list" class="result-list"></div>
        <div class="btn-row">
            <button id="retry-btn" class="btn btn-ghost">重新作答</button>
            <button id="back-btn"  class="btn btn-primary">換題目集</button>
        </div>
    </div>

</div>
<script>
/* =============================================================
      設定
      MANIFEST_PATH: 題目清單的路徑，通常不需要改
      ============================================================= */
const MANIFEST_PATH = 'manifest.json';

/* 狀態 */
let quizSets  = [];
let questions = [];
let current   = 0;
let answers   = [];
let selected  = new Set();
let isComprehensive = false;

/* 畫面切換 */
const screens = {
    select: document.getElementById('select-screen'),
    quiz:   document.getElementById('quiz-screen'),
    result: document.getElementById('result-screen'),
};
function showScreen(name) {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
}

/* 初始化：載入 manifest */
async function init() {
    showScreen('select');
    const listEl = document.getElementById('quiz-list');
    try {
        const res = await fetch(MANIFEST_PATH);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        quizSets = await res.json();
        renderQuizList();
    } catch (e) {
        listEl.innerHTML = `<p class="toast error">⚠ 無法載入 manifest.json<br><small>${e.message}</small></p>`;
    }
}

/* 渲染題目集選單 */
function renderQuizList() {
    const listEl   = document.getElementById('quiz-list');
    const startBtn = document.getElementById('start-btn');
    let chosen = null;

    let listHtml = quizSets.map((q, i) => `
        <div class="quiz-card" data-i="${i}">
            <div class="name">${q.title}</div>
            <div class="meta">${q.description ?? ''}</div>
        </div>
    `).join('');

    // 插入「綜合測驗」選項
    listHtml += `
        <div class="quiz-card comprehensive" data-i="comp">
            <div class="name">🔥 全題目綜合測驗</div>
            <div class="meta">從所有章節隨機出題，無壓力模式</div>
        </div>
    `;

    listEl.innerHTML = listHtml;

    listEl.querySelectorAll('.quiz-card').forEach(card => {
        card.addEventListener('click', () => {
            listEl.querySelectorAll('.quiz-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            chosen = card.dataset.i;
            startBtn.disabled = false;
        });
    });

    startBtn.onclick = async () => {
        if (chosen === null) return;
        if (chosen === 'comp') {
            isComprehensive = true;
            await loadComprehensiveQuiz();
        } else {
            isComprehensive = false;
            await loadQuiz(quizSets[parseInt(chosen)].file);
        }
    };
}

/* 綜合測驗：載入所有 JSON */
async function loadComprehensiveQuiz() {
    try {
        const allQuestions = [];
        for (const set of quizSets) {
            const res = await fetch(set.file);
            const data = await res.json();
            const raw = Array.isArray(data) ? data : (data.questions || []);
            allQuestions.push(...raw);
        }
        processAndStart(allQuestions);
    } catch (e) {
        alert(`載入綜合題目失敗: ${e.message}`);
    }
}

/* 載入單一題目 JSON */
async function loadQuiz(file) {
    try {
        const res = await fetch(file);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const rawData = await res.json();
        const rawQuestions = Array.isArray(rawData) ? rawData : (rawData.questions || []);
        processAndStart(rawQuestions);
    } catch (e) {
        alert(`載入題目失敗: ${e.message}`);
    }
}

/* 處理題目資料並開始 */
function processAndStart(raw) {
    questions = raw.map(q => {
        const questionText = q["題目"] || q.question;
        const options = q["選項"] || q.options;
        let ans = q["答案"] !== undefined ? q["答案"] : q.answer;
        const id = q["題號"] || q.id || "";
        const level = q["難易度"] || q.difficulty || q.level || "";
        const topic = q["topic"] || "";
        
        if (typeof ans === 'number') {
            ans = ans - 1;
        } else if (Array.isArray(ans)) {
            ans = ans.map(a => typeof a === 'number' ? a - 1 : a);
        }

        return {
            question: questionText,
            options: options,
            answer: ans,
            id: id,
            level: level,
            topic: topic
        };
    });

    questions = shuffle(questions);
    current = 0;
    answers = [];
    showScreen('quiz');
    renderQuestion();
}

/* 渲染題目 */
function renderQuestion() {
    const q       = questions[current];
    const total   = questions.length;
    const isMulti = Array.isArray(q.answer);
    selected = new Set();

    document.getElementById('progress-bar').style.width = `${(current / total) * 100}%`;
    
    // 綜合模式不顯示總題數，減輕壓力
    document.getElementById('q-counter').textContent = isComprehensive 
        ? `第 ${current + 1} 題` 
        : `${current + 1} / ${total}`;
    
    const meta = [q.id, q.level].filter(Boolean).join(' | ');
    document.getElementById('type-badge').textContent   = (meta ? meta + ' · ' : '') + (isMulti ? '多選題' : '單選題');
    document.getElementById('topic-badge').textContent  = q.topic || "";
    document.getElementById('question-text').textContent = q.question;

    const optEl   = document.getElementById('options');
    const nextBtn = document.getElementById('next-btn');
    const exitBtn = document.getElementById('exit-btn');
    const keys    = ['A','B','C','D','E','F'];
    nextBtn.disabled = true;
    nextBtn.textContent = current === total - 1 ? '查看結果 →' : '下一題 →';

    optEl.innerHTML = q.options.map((opt, i) => `
        <div class="option" data-i="${i}">
            <span class="option-key">${keys[i]}</span>
            <span class="option-text">${opt}</span>
        </div>
    `).join('');

    exitBtn.onclick = () => {
        if (confirm('確定要退出並查看目前的結果嗎？')) {
            showResult();
        }
    };

    optEl.querySelectorAll('.option').forEach(el => {
        el.addEventListener('click', () => {
            if (el.classList.contains('locked')) return;
            const idx = parseInt(el.dataset.i);
            if (isMulti) {
                selected.has(idx) ? selected.delete(idx) : selected.add(idx);
                el.classList.toggle('selected', selected.has(idx));
            } else {
                optEl.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                selected = new Set([idx]);
                el.classList.add('selected');
            }
            nextBtn.disabled = selected.size === 0;
        });
    });

    nextBtn.onclick = () => submitAnswer(q, isMulti);
}

/* 提交答案 */
function submitAnswer(q, isMulti) {
    const optEls = document.querySelectorAll('.option');
    const correct = isMulti ? new Set(q.answer) : new Set([q.answer]);

    optEls.forEach(el => {
        el.classList.add('locked');
        const idx = parseInt(el.dataset.i);
        if (correct.has(idx)) el.classList.add('correct');
        if (selected.has(idx) && !correct.has(idx)) el.classList.add('wrong');
    });

    const isCorrect = isMulti
        ? [...selected].sort().toString() === [...correct].sort().toString()
        : selected.has([...correct][0]);

    answers.push({
        question: q.question,
        options:  q.options,
        selected: [...selected],
        correct:  [...correct],
        topic:    q.topic,
        isCorrect,
    });

    setTimeout(() => {
        current++;
        if (current < questions.length) renderQuestion();
        else showResult();
    }, 900);
}

/* 結果畫面 */
function showResult() {
    showScreen('result');
    const keys    = ['A','B','C','D','E','F'];
    const totalQuestions = questions.length;
    const answeredCount = answers.length;
    const correctCount = answers.filter(a => a.isCorrect).length;

    document.getElementById('score-number').textContent = `${correctCount} / ${answeredCount}`;

    // 弱點分析
    const stats = {};
    answers.forEach(a => {
        if (!a.topic) return;
        if (!stats[a.topic]) stats[a.topic] = { total: 0, ok: 0 };
        stats[a.topic].total++;
        if (a.isCorrect) stats[a.topic].ok++;
    });

    const topicList = Object.keys(stats);
    if (topicList.length > 0) {
        document.getElementById('weakness-analysis').style.display = 'block';
        document.getElementById('weakness-list').innerHTML = topicList.map(name => {
            const s = stats[name];
            const rate = Math.round((s.ok / s.total) * 100);
            return `
                <div class="weakness-item">
                    <div class="weakness-name">${name}</div>
                    <div class="weakness-bar-bg"><div class="weakness-bar-fg" style="width:${rate}%"></div></div>
                    <div class="weakness-score">${rate}%</div>
                </div>
            `;
        }).join('');
    } else {
        document.getElementById('weakness-analysis').style.display = 'none';
    }

    let resultHtml = answers.map((a, i) => `
        <div class="result-item ${a.isCorrect ? 'ok' : 'fail'}">
            <div class="ri-q">
                <span>第 ${i+1} 題</span>
                <span class="ri-topic">${a.topic || ''}</span>
            </div>
            <div>${a.question}</div>
            <div class="ri-status">
                ${a.isCorrect
                    ? '✓ 答對'
                    : `✗ 答錯 ── 正確：${a.correct.map(c => keys[c]).join('、')}　你選了：${a.selected.map(c => keys[c]).join('、') || '（未作答）'}`
                }
            </div>
        </div>
    `).join('');

    if (answeredCount < totalQuestions) {
        resultHtml += `<p class="toast">（提前退出，未完成其餘 ${totalQuestions - answeredCount} 題）</p>`;
    }

    document.getElementById('result-list').innerHTML = resultHtml;

    document.getElementById('retry-btn').onclick = () => {
        questions = shuffle(questions);
        current = 0; answers = [];
        showScreen('quiz');
        renderQuestion();
    };
    document.getElementById('back-btn').onclick = init;
}

/* 工具：隨機排序 */
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

init();
</script>
</body>
</html>
