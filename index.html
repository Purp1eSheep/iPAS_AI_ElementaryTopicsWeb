<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
    /* CSS 變數維持不變，保持主題系統運作 */
        :root {
            --bg: #0f1117; --surface: #1a1d27; --surface2: #23263a;
            --border: #2d3148; --accent: #7c6dfa; --accent-soft: rgba(124,109,250,.15);
            --text: #e8eaf0; --muted: #7a7e9a; --correct: #4caf87;
            --correct-soft: rgba(76,175,135,.15); --wrong: #e05c6e;
            --wrong-soft: rgba(224,92,110,.15); --radius: 14px;
            --transition: .2s ease; --theme-desc-color: #ffffff;
        }
        [data-theme="light"] {
            --bg: #f4f5f7; --surface: #ffffff; --surface2: #eef0f5;
            --border: #d1d5db; --accent: #5850ec; --accent-soft: rgba(88,80,236,.1);
            --text: #1f2937; --muted: #6b7280; --correct: #059669;
            --correct-soft: rgba(5,150,105,.1); --wrong: #dc2626;
            --wrong-soft: rgba(220,38,38,.1); --theme-desc-color: #000000;
        }
        [data-theme="ocean"] {
            --bg: #0a192f; --surface: #112240; --surface2: #1d2d50;
            --border: #233554; --accent: #64ffda; --accent-soft: rgba(100,255,218,.1);
            --text: #ccd6f6; --muted: #8892b0; --correct: #10b981;
            --correct-soft: rgba(16,185,129,.1); --wrong: #f43f5e;
            --wrong-soft: rgba(244,63,94,.1); --theme-desc-color: #64ffda;
        }

        /* 基礎樣式重置與共用類別 */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 24px 16px;
            transition: background var(--transition), color var(--transition);
        }
        .hidden { display: none !important; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .flex-gap { display: flex; gap: 8px; }
        .flex-col { display: flex; flex-direction: column; gap: 10px; }
        .text-center { text-align: center; }
        .mt-3 { margin-top: 12px; } .mb-3 { margin-bottom: 12px; }
        .w-100 { width: 100%; }

        /* 模組與元件樣式 (移除過多重複樣式，保留核心) */
        #top-bar {
            position: fixed; top: 0; left: 0; right: 0;
            background: var(--surface); border-bottom: 1px solid var(--border);
            z-index: 1000; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background var(--transition);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        #top-bar.collapsed { transform: translateY(-100%); }
        .top-bar-content { padding: 12px 24px; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        
        .settings-dropdown { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; background: var(--surface); }
        .settings-open .settings-dropdown { max-height: 100vh; overflow-y: auto; border-top: 1px solid var(--border); }
        .settings-content { padding: 32px 24px; max-width: 680px; margin: 0 auto; }
        
        .top-bar-toggle {
            position: absolute; bottom: -24px; right: 24px;
            background: var(--surface); border: 1px solid var(--border); border-top: none;
            color: var(--muted); padding: 2px 16px; border-radius: 0 0 10px 10px; cursor: pointer;
        }
        .settings-open .top-bar-toggle { visibility: hidden; }
        
        .btn-link { color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 6px; background: none; border: none; cursor: pointer;}
        .btn-link:hover { color: var(--accent); }

        #app { width: 100%; max-width: 680px; margin-top: 40px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; }

        h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
        h2 { font-size: 1.25rem; font-weight: 600; line-height: 1.5; margin-bottom: 20px; white-space: pre-wrap; }
        p { color: var(--muted); font-size: .95rem; line-height: 1.6; }

        /* 設定區、選單區 */
        .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
        .theme-option { padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; text-align: center; font-weight: 600; transition: var(--transition); }
        .theme-option.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
        
        .list-section { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 8px; }
        .list-section-header { background: var(--surface2); padding: 14px 20px; font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .list-section-header::after { content: '▼'; font-size: 0.7rem; color: var(--muted); transition: transform 0.3s; }
        .list-section.active .list-section-header::after { transform: rotate(180deg); }
        .list-section-content { display: none; padding: 10px; flex-direction: column; gap: 8px; background: rgba(0,0,0,0.1); }
        .list-section.active .list-section-content { display: flex; }

        .quiz-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: var(--transition); user-select: none; }
        .quiz-card:hover { border-color: var(--accent); transform: translateX(4px); }
        .quiz-card.selected { border-color: var(--accent); background: var(--accent-soft); }
        .quiz-card .name { font-weight: 600; font-size: 0.95rem; }
        .quiz-card .meta { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
        .challenge-title { font-size: 0.85rem; color: var(--accent); font-weight: 700; margin-bottom: 8px; padding-left: 4px; text-transform: uppercase; }

        /* 按鈕樣式 */
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; border-radius: 10px; border: none; font-size: .95rem; font-weight: 600; cursor: pointer; transition: opacity var(--transition), transform var(--transition); }
        .btn:active:not(:disabled) { transform: scale(.97); }
        .btn-primary { background: var(--accent); color: #fff; width: 100%; }
        .btn-primary:hover:not(:disabled) { opacity: .88; }
        .btn:disabled { opacity: .4; cursor: not-allowed; }
        .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .btn-danger { color: var(--wrong) !important; border-color: var(--wrong) !important; }

        /* 答題區 */
        .progress-wrap { flex: 1; height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent); border-radius: 99px; transition: width .4s ease; }
        .badge { font-size: .72rem; padding: 3px 10px; border-radius: 99px; font-weight: 600; margin-bottom: 16px; display: inline-block; }
        .badge-primary { background: var(--accent-soft); color: var(--accent); }
        .badge-secondary { background: var(--surface2); color: var(--muted); margin-left: 8px; }

        .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
        .option { background: var(--surface2); border: 2px solid var(--border); border-radius: 10px; padding: 14px 18px; cursor: pointer; display: flex; align-items: center; gap: 14px; user-select: none; transition: var(--transition); }
        .option:hover:not(.locked) { border-color: var(--accent); }
        .option.selected { border-color: var(--accent); background: var(--accent-soft); }
        .option.correct { border-color: var(--correct); background: var(--correct-soft); }
        .option.wrong { border-color: var(--wrong); background: var(--wrong-soft); }
        .option-key { width: 28px; height: 28px; border-radius: 7px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: .78rem; font-weight: 700; flex-shrink: 0; transition: var(--transition); }
        .option.selected .option-key { background: var(--accent); color: #fff; }
        .option.correct .option-key { background: var(--correct); color: #fff; }
        .option.wrong .option-key { background: var(--wrong); color: #fff; }

        /* 結果區 */
        .score-ring { margin: 28px 0 32px; gap: 6px; }
        .score-number { font-size: 3.5rem; font-weight: 800; line-height: 1; }
        .rainbow-text { 
        background: linear-gradient(to right, #ef5350, #f48fb1, #7e57c2, #2196f3, #26c6da, #43a047, #eeff41, #f9a825, #ff5722); 
        
        /* 針對舊版 WebKit 瀏覽器 */
        -webkit-background-clip: text; 
        -webkit-text-fill-color: transparent; 
        
        /* 加上標準屬性以消除警告 */
        background-clip: text; 
        color: transparent; 
        
        background-size: 400% 400%; 
        animation: rainbow 3s ease infinite; 
        }
        
        @keyframes rainbow { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        .result-item { background: var(--surface2); border-radius: 10px; padding: 14px 18px; border-left: 4px solid var(--border); margin-bottom: 10px; font-size: .9rem; }
        .result-item.ok { border-color: var(--correct); }
        .result-item.fail { border-color: var(--wrong); }

        /* 模態框 (Modal) */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        .modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        .close-modal { background: none; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; }
        .close-modal:hover { color: var(--text); }

        /* 儀表板 & 題庫瀏覽器 */
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 24px; margin-top: 20px; }
        .dashboard-stat-card { background: var(--surface2); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
        .chart-container { position: relative; height: 260px; width: 100%; margin-bottom: 10px; }
        .scrollable-list { max-height: 300px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; background: rgba(0,0,0,0.1); }
        
        .filter-panel { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .filter-panel input, .filter-panel select { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; }
        .browser-list { max-height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 4px; }
        .question-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; transition: border-color var(--transition); }
        .question-card:hover { border-color: var(--accent); }
    </style>
</head>
<body>

<header id="top-bar">
    <div class="top-bar-content">
        <a href="https://github.com/Purp1eSheep/iPAS_AI_ElementaryTopicsWeb" target="_blank" class="btn-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            GitHub Repo
        </a>
        <button id="settings-btn" class="btn-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            設定
        </button>
    </div>

    <div id="settings-dropdown" class="settings-dropdown">
        <div class="settings-content">
            <h1>⚙️ 設定</h1>
            <div class="mt-3 mb-3">
                <div class="challenge-title">主題選擇</div>
                <div class="theme-grid" id="theme-grid">
                    <div class="theme-option" data-theme="dark">深色</div>
                    <div class="theme-option" data-theme="light">淺色</div>
                    <div class="theme-option" data-theme="ocean">深海</div>
                </div>
                <p id="theme-description" class="text-center"></p>
            </div>
            <div class="mb-3">
                <div class="challenge-title">功能設定</div>
                <div id="audio-toggle-card" class="quiz-card flex-between">
                    <div class="name">🔥 BrainRot mode</div>
                    <div id="audio-status" class="meta"></div>
                </div>
            </div>
            <div class="flex-col mb-3">
                <div class="challenge-title">資料管理</div>
                <button id="clear-stats-btn" class="btn btn-ghost btn-danger">📊 清除統計數據</button>
                <button id="clear-history-btn" class="btn btn-ghost btn-danger">❌ 清除錯題標記</button>
                <button id="clear-all-btn" class="btn btn-ghost btn-danger">🔥 清除所有資料</button>
            </div>
            <button id="settings-back-btn" class="btn btn-primary mt-3">返回</button>
        </div>
    </div>
    <button id="top-bar-toggle" class="top-bar-toggle">▲</button>
</header>

<main id="app">
    <section id="select-screen" class="screen card active">
        <h1>📝 Quiz</h1>
        <p class="mb-3">選擇題目集，然後開始作答</p>
        
        <div id="resume-banner" class="flex-between mb-3 hidden" style="background:var(--accent-soft); border:1px solid var(--accent); padding:16px; border-radius:var(--radius);">
            <span style="color:var(--accent); font-weight:600;">👋 偵測到未完成進度</span>
            <div class="flex-gap">
                <button id="resume-yes-btn" class="btn btn-primary" style="padding:6px 12px; width:auto;">恢復</button>
                <button id="resume-no-btn" class="btn btn-ghost" style="padding:6px 12px; width:auto;">放棄</button>
            </div>
        </div>

        <div id="quiz-list" class="flex-col mb-3"><p class="text-center">載入中…</p></div>
        
        <div class="flex-gap mb-3">
            <button id="browse-btn" class="btn btn-ghost w-100">🔍 瀏覽全部題庫</button>
            <button id="analysis-btn" class="btn btn-ghost w-100">📊 學習分析看板</button>
        </div>
        <button id="start-btn" class="btn btn-primary" disabled>開始作答 →</button>
    </section>

    <section id="browser-screen" class="screen">
        <div class="card">
            <div class="flex-between mb-3">
                <h1 style="margin:0;">📚 題庫瀏覽器</h1>
                <button id="browser-back-btn" class="btn btn-ghost" style="padding: 8px 16px;">返回</button>
            </div>
            <div class="filter-panel">
                <input type="text" id="search-input" placeholder="搜尋關鍵字..." style="grid-column:span 2;">
                <select id="topic-filter"><option value="">所有主題</option></select>
                <select id="diff-filter"><option value="">所有難度</option><option value="易">易</option><option value="中">中</option><option value="難">難</option></select>
                <div style="grid-column:span 2;" class="flex-gap">
                    <label><input type="checkbox" id="only-bookmarked"> ⭐ 只看收藏</label>
                    <label><input type="checkbox" id="only-risky"> ⚠️ 只看易錯題</label>
                </div>
            </div>
            <div id="browser-list" class="browser-list"></div>
        </div>
    </section>

    <section id="quiz-screen" class="screen">
        <div class="card">
            <div class="flex-between mb-3">
                <div class="progress-wrap"><div id="progress-bar" class="progress-bar" style="width:0%"></div></div>
                <span id="q-counter" style="font-size:.82rem; color:var(--muted); white-space:nowrap; margin-left:12px;"></span>
            </div>
            <div>
                <span id="type-badge" class="badge badge-primary"></span>
                <span id="topic-badge" class="badge badge-secondary"></span>
            </div>
            <h2 id="question-text"></h2>
            <div id="options" class="options"></div>
            <div id="explanation-container" class="mb-3"></div>
            
            <div class="flex-gap">
                <button id="exit-btn" class="btn btn-ghost btn-danger" style="flex: 0 0 80px;">退出</button>
                <button id="prev-btn" class="btn btn-ghost w-100">上一題</button>
                <button id="next-btn" class="btn btn-primary w-100">下一題</button>
            </div>
        </div>
    </section>

    <section id="result-screen" class="screen card">
        <h1>結果</h1>
        <div class="score-ring text-center">
            <div id="score-number" class="score-number">—</div>
            <div id="score-percent" style="font-size:1.2rem; font-weight:700;"></div>
            <div style="color:var(--muted); font-size:.9rem;">答對題數</div>
        </div>
        <div id="result-message" class="text-center" style="font-size:1.4rem; font-weight:700; color:var(--wrong); margin-bottom:20px;"></div>
        <div class="text-center mb-3"><button id="cancel-redirect-btn" class="btn btn-danger hidden">我不要當兵</button></div>
        
        <div id="weakness-analysis" class="dashboard-stat-card mb-3 hidden">
            <div class="challenge-title">📊 弱點分析</div>
            <div id="weakness-list"></div>
        </div>
        <div id="result-list" class="flex-col mb-3"></div>
        <button id="back-btn" class="btn btn-primary">返回主畫面</button>
    </section>
</main>

<div id="analysis-modal" class="modal">
    <div class="modal-content" style="max-width: 800px;">
        <div class="flex-between mb-3">
            <h2>📈 大數據學習分析看板</h2>
            <button class="close-modal" id="close-analysis">&times;</button>
        </div>
        <div class="filter-panel" style="margin-bottom: 20px; grid-template-columns: 1fr;">
            <select id="dashboard-unit-filter"><option value="">所有單元</option></select>
        </div>
        <div id="dashboard-content">    
            <div class="dashboard-grid">
                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:20px;">
                    <div class="dashboard-stat-card text-center">
                        <div id="overall-accuracy" style="font-size:2.5rem; font-weight:800; color:var(--accent);">—</div>
                        <div style="color:var(--muted); font-size:.85rem;">目前正確率 (已答)</div>
                    </div>
                    <div class="dashboard-stat-card text-center">
                        <div id="overall-progress" style="font-size:2.5rem; font-weight:800; color:var(--accent);">—</div>
                        <div style="color:var(--muted); font-size:.85rem;">題庫完成度</div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:20px;">
                    <div class="dashboard-stat-card"><div class="challenge-title">📌 進度概覽</div><div class="chart-container"><canvas id="progressChart"></canvas></div></div>
                    <div class="dashboard-stat-card"><div class="challenge-title">📊 各單元表現</div><div class="chart-container"><canvas id="unitChart"></canvas></div></div>
                </div>
                <div class="dashboard-stat-card"><div class="challenge-title">🚩 易錯 Top 10</div><div class="chart-container"><canvas id="riskChart"></canvas></div></div>
                <div class="dashboard-stat-card">
                    <div class="challenge-title">📋 完整數據清單</div>
                    <div class="scrollable-list" id="full-analysis-list"></div>
                </div>
            </div>
        </div>
        <div id="no-data-msg" class="text-center mt-3 hidden">尚未有紀錄，快開始吧！</div>
        <div class="flex-gap mt-3">
            <button id="clear-stats-btn-dash" class="btn btn-ghost btn-danger w-100">🔥 清除數據</button>
            <button id="analysis-close-btn" class="btn btn-primary w-100">關閉</button>
        </div>
    </div>
</div>

<div id="ai-modal" class="modal">
    <div class="modal-content">
        <div class="flex-between mb-3">
            <h2>🤖 AI 詳解助教</h2>
            <button class="close-modal" id="close-ai">&times;</button>
        </div>
        <div style="background:var(--surface2); padding:15px; border-radius:8px; border:1px solid var(--border);">
            <textarea id="ai-prompt-text" style="width:100%; height:200px; background:transparent; border:none; color:var(--text); resize:none; outline:none;" readonly></textarea>
        </div>
        <div class="flex-gap mt-3" style="justify-content:flex-end;">
            <button class="btn btn-ghost" id="copy-ai-prompt">複製</button>
            <button class="btn btn-primary" id="close-ai-btn">關閉</button>
        </div>
    </div>
</div>

<script>
/**
 * 架構優化：
 * 1. 統整 DOM 快取
 * 2. 統整 State 管理
 * 3. 統整 Storage API
 * 4. 採用事件委派 (Event Delegation) 減少 Listener 綁定
 */

// --- 1. DOM Cache ---
const DOM = {
    screens: {
        select: document.getElementById('select-screen'),
        browser: document.getElementById('browser-screen'),
        quiz: document.getElementById('quiz-screen'),
        result: document.getElementById('result-screen')
    },
    topBar: document.getElementById('top-bar'),
    settingsDrop: document.getElementById('settings-dropdown'),
    quizList: document.getElementById('quiz-list'),
    startBtn: document.getElementById('start-btn'),
    // Quiz Elements
    progress: document.getElementById('progress-bar'),
    counter: document.getElementById('q-counter'),
    qText: document.getElementById('question-text'),
    optionsWrap: document.getElementById('options'),
    expWrap: document.getElementById('explanation-container'),
    nextBtn: document.getElementById('next-btn'),
    prevBtn: document.getElementById('prev-btn'),
    // Modals
    aiModal: document.getElementById('ai-modal'),
    aiPromptText: document.getElementById('ai-prompt-text')
};

// --- 2. Application State ---
const State = {
    quizSets: [],
    globalQuestions: [],
    activeQuestions: [],
    currentIdx: 0,
    answers: [],
    currentSelection: new Set(),
    isComprehensive: false,
    audioEnabled: false,
    audio: {
        correct: new Audio('sfx/answer-correct.mp3'),
        wrong: new Audio('sfx/fah.mp3'),
        cheer: new Audio('sfx/kids_cheering.mp3'),
        sad: new Audio('sfx/spongebob-sad-song.mp3')
    },
    charts: { progress: null, risk: null },
    redirectTimer: null
};

// --- 3. Storage Manager ---
const Storage = {
    KEYS: { WRONG: 'quiz_wrong', STATS: 'quiz_stats', THEME: 'quiz_theme', AUDIO: 'quiz_audio', BOOKMARKS: 'quiz_bookmarks', PROG: 'quiz_prog' },
    get: (key, def) => {
        const val = localStorage.getItem(key);
        if (val === null) return def;
        try {
            return JSON.parse(val);
        } catch (e) {
            // 兼容舊版純字串資料 (例如舊的 "dark", "light")
            return val;
        }
    },
    set: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
    remove: (key) => localStorage.removeItem(key),
    clearAll: () => localStorage.clear()
};

// --- 4. Utilities ---
const Utils = {
    formatText: text => text ? text.replace(/ ([A-Da-d]\.)/g, '\n$1') : "",
    shuffle: arr => [...arr].sort(() => Math.random() - 0.5),
    weightedShuffle: (arr, stats) => {
        return [...arr].map(q => {
            const s = stats[q.id] || { t: 0, w: 0 };
            const accuracy = s.t > 0 ? (s.t - s.w) / s.t : 0;
            let weight = 10; // 預設權重 (其他題目)

            if (s.t === 0) {
                weight = 100; // 1. 沒答過的題目
            } else if (s.t > 15 && accuracy > 0.85) {
                weight = 1;   // 答題次數與正確率夠高的題目 (機率極小)
            } else if (accuracy > 0.8) {
                weight = 50;  // 2. 錯誤率過低的題目
            } else if (s.t < 5) {
                weight = 30;  // 3. 答題次數較低的題目
            }
            
            // 使用 Efraimidis and Spirakis 演算法進行加權隨機抽樣
            return { q, sortKey: Math.pow(Math.random(), 1 / weight) };
        })
        .sort((a, b) => b.sortKey - a.sortKey)
        .map(item => item.q);
    },
    normalizeIndex: ans => Array.isArray(ans) ? ans.map(a => typeof a === 'number' ? a - 1 : a) : (typeof ans === 'number' ? ans - 1 : ans)
};

// --- 5. Core Initialization ---
async function init() {
    initSettings();
    initEvents(); // 一次性綁定所有靜態事件
    
    try {
        const [manifestRes, qRes] = await Promise.all([
            fetch('data/manifest.json'),
            fetch('data/all_questions.json')
        ]);
        State.quizSets = await manifestRes.json();
        
        // 載入時即完成資料正規化 (Normalize Data)
        const rawQs = await qRes.json();
        State.globalQuestions = rawQs.map(q => ({
            ...q,
            answer: Utils.normalizeIndex(q.answer) 
        }));

        renderQuizList();
        checkProgress();
    } catch (e) {
        DOM.quizList.innerHTML = `<p class="text-center" style="color:var(--wrong)">資料載入失敗</p>`;
    }
}

// --- 6. Event Bindings (綁定一次，拒絕重複綁定) ---
function initEvents() {
    // 畫面導航
    document.getElementById('browse-btn').onclick = () => { initBrowser(); switchScreen('browser'); };
    document.getElementById('browser-back-btn').onclick = () => switchScreen('select');
    document.getElementById('back-btn').onclick = () => { 
        clearTimeout(State.redirectTimer); 
        stopResultAudio();
        switchScreen('select'); 
        renderQuizList(); 
    };
    
    // 綁定學習分析看板
    document.getElementById('analysis-btn').onclick = () => { renderDashboard(); document.getElementById('analysis-modal').classList.add('active'); };
    document.getElementById('close-analysis').onclick = () => document.getElementById('analysis-modal').classList.remove('active');
    document.getElementById('analysis-close-btn').onclick = () => document.getElementById('analysis-modal').classList.remove('active');
    document.getElementById('dashboard-unit-filter').onchange = () => renderDashboard();
    
    // Quiz 控制
    DOM.exitBtn = document.getElementById('exit-btn');
    DOM.exitBtn.onclick = () => confirm('確定要退出看結果？') && showResult();
    DOM.prevBtn.onclick = () => { if (State.currentIdx > 0) { State.currentIdx--; renderQuestion(); } };
    DOM.nextBtn.onclick = handleNextClick;

    // 選項點擊 (Event Delegation)
    DOM.optionsWrap.onclick = (e) => {
        const optionEl = e.target.closest('.option');
        if (!optionEl || optionEl.classList.contains('locked') || State.answers[State.currentIdx] !== null) return;
        
        const idx = parseInt(optionEl.dataset.i);
        const q = State.activeQuestions[State.currentIdx];
        const isMulti = Array.isArray(q.answer);

        if (isMulti) {
            State.currentSelection.has(idx) ? State.currentSelection.delete(idx) : State.currentSelection.add(idx);
            optionEl.classList.toggle('selected');
        } else {
            if (State.currentSelection.has(idx)) return handleNextClick(); // 雙擊確認
            DOM.optionsWrap.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            State.currentSelection = new Set([idx]);
            optionEl.classList.add('selected');
        }
        updateNextBtnUI();
        saveProgress();
    };

    // 列表點擊 (Event Delegation)
    DOM.quizList.onclick = (e) => {
        const header = e.target.closest('.list-section-header');
        if (header) header.parentElement.classList.toggle('active');

        const card = e.target.closest('.quiz-card');
        if (!card) return;

        if (card.classList.contains('challenge-card')) {
            DOM.quizList.querySelectorAll('.topic-checkbox').forEach(cb => { cb.checked = false; cb.closest('.quiz-card').classList.remove('selected'); });
            DOM.quizList.querySelectorAll('.challenge-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
        } else if (card.classList.contains('topic-card')) {
            const cb = card.querySelector('.topic-checkbox');
            if (e.target !== cb) cb.checked = !cb.checked;
            card.classList.toggle('selected', cb.checked);
            if (cb.checked) DOM.quizList.querySelectorAll('.challenge-card').forEach(c => c.classList.remove('selected'));
        }
        
        const hasTopic = DOM.quizList.querySelectorAll('.topic-checkbox:checked').length > 0;
        const hasChallenge = DOM.quizList.querySelector('.challenge-card.selected');
        DOM.startBtn.disabled = !(hasTopic || hasChallenge);
    };

    DOM.startBtn.onclick = startQuizFlow;

    // AI Modal 控制
    document.getElementById('close-ai').onclick = () => DOM.aiModal.classList.remove('active');
    document.getElementById('close-ai-btn').onclick = () => DOM.aiModal.classList.remove('active');
    document.getElementById('copy-ai-prompt').onclick = (e) => {
        DOM.aiPromptText.select();
        navigator.clipboard.writeText(DOM.aiPromptText.value).then(() => {
            const btn = e.target;
            const orig = btn.textContent;
            btn.textContent = '✅ 已複製';
            setTimeout(() => btn.textContent = orig, 2000);
        });
    };
    
    // 全域涵蓋AI呼叫綁定 (For elements generated via innerHTML)
    window.openAIPrompt = (q) => {
        if (!q) return;
        const keys = ['A','B','C','D','E','F'];
        const ansIndices = Array.isArray(q.answer) ? q.answer : [q.answer];
        const optText = q.options.map((o, i) => `${keys[i]}. ${o}`).join('\n');
        
        DOM.aiPromptText.value = `你是一個專業老師，請幫忙詳細解釋以下選擇題，分析關鍵資訊並說明為何正確答案是對的。\n\n題目：${q.question}\n\n選項：\n${optText}\n\n請以繁體中文回答。`;
        DOM.aiModal.classList.add('active');
    };
}

// --- 7. View Controllers ---
function switchScreen(name) {
    Object.values(DOM.screens).forEach(s => s.classList.remove('active'));
    DOM.screens[name].classList.add('active');
    document.getElementById('top-bar').classList.remove('settings-open');
}

function renderQuizList() {
    const wrongIds = Storage.get(Storage.KEYS.WRONG, []);
    let html = `
        <div class="mb-3">
            <div class="challenge-title">挑戰</div>
            <div class="quiz-card challenge-card" data-type="comp">
                <div class="name">🔥 綜合測驗</div><div class="meta">所有章節隨機</div>
            </div>
            ${wrongIds.length ? `<div class="quiz-card challenge-card mt-3" data-type="wrong" style="border-color:var(--wrong); background:var(--wrong-soft);"><div class="name">❌ 錯題強化</div><div class="meta">${wrongIds.length} 題</div></div>` : ''}
        </div>
    `;
    State.quizSets.forEach(set => {
        html += `<div class="list-section"><div class="list-section-header">${set.subject}</div><div class="list-section-content">`;
        html += set.topics.map(t => `<div class="quiz-card topic-card"><input type="checkbox" class="topic-checkbox hidden" value="${t.full_topic}"><div class="name">${t.title}</div><div class="meta">共 ${t.count} 題</div></div>`).join('');
        html += `</div></div>`;
    });
    DOM.quizList.innerHTML = html;
}

function startQuizFlow() {
    const challenge = DOM.quizList.querySelector('.challenge-card.selected');
    const checked = Array.from(DOM.quizList.querySelectorAll('.topic-checkbox:checked')).map(cb => cb.value);
    const stats = Storage.get(Storage.KEYS.STATS, {});
    
    if (challenge) {
        State.isComprehensive = true;
        if (challenge.dataset.type === 'comp') {
            // 綜合測驗：從全部題目中按權重隨機抽取 40 題
            State.activeQuestions = Utils.weightedShuffle(State.globalQuestions, stats).slice(0, 40);
        } else {
            // 錯題強化：顯示所有錯題並打亂
            const filtered = State.globalQuestions.filter(q => Storage.get(Storage.KEYS.WRONG, []).includes(q.id));
            State.activeQuestions = Utils.shuffle(filtered);
        }
    } else {
        State.isComprehensive = checked.length > 1;
        const filtered = State.globalQuestions.filter(q => checked.includes(q.topic));
        // 主題測驗：按權重排序
        State.activeQuestions = Utils.weightedShuffle(filtered, stats);
        // 如果跨多個主題且題目過多，限制在 50 題以內
        if (State.isComprehensive && State.activeQuestions.length > 50) {
            State.activeQuestions = State.activeQuestions.slice(0, 50);
        }
    }

    if (!State.activeQuestions.length) return;
    
    State.answers = new Array(State.activeQuestions.length).fill(null);
    State.currentIdx = 0;
    Storage.remove(Storage.KEYS.PROG);
    
    switchScreen('quiz');
    renderQuestion();
}

function renderQuestion() {
    const q = State.activeQuestions[State.currentIdx];
    State.currentSelection = new Set();
    
    DOM.progress.style.width = `${(State.currentIdx / State.activeQuestions.length) * 100}%`;
    DOM.counter.textContent = State.isComprehensive ? `第 ${State.currentIdx + 1} 題` : `${State.currentIdx + 1} / ${State.activeQuestions.length}`;
    
    const meta = [q.id, q.level].filter(Boolean).join(' | ');
    document.getElementById('type-badge').textContent = meta;
    document.getElementById('type-badge').className = `badge badge-primary ${!meta ? 'hidden' : ''}`;
    document.getElementById('topic-badge').textContent = q.topic;
    DOM.qText.textContent = Utils.formatText(q.question);
    DOM.expWrap.innerHTML = '';
    
    const isAns = State.answers[State.currentIdx] !== null;
    const ansData = isAns ? State.answers[State.currentIdx] : null;
    const keys = ['A','B','C','D','E','F'];

    DOM.optionsWrap.innerHTML = q.options.map((opt, i) => {
        let cls = 'option';
        if (isAns) {
            cls += ' locked';
            if (ansData.correct.includes(i)) cls += ' correct';
            if (ansData.selected.includes(i) && !ansData.correct.includes(i)) cls += ' wrong';
            if (ansData.selected.includes(i) && ansData.correct.includes(i)) cls += ' selected';
        }
        return `<div class="${cls}" data-i="${i}"><span class="option-key">${keys[i]}</span><span class="option-text">${opt}</span></div>`;
    }).join('');

    if (isAns && !ansData.isCorrect) addAIBtn(q);
    
    DOM.prevBtn.disabled = State.currentIdx === 0;
    updateNextBtnUI();
    saveProgress();
}

function updateNextBtnUI() {
    DOM.nextBtn.disabled = false;
    DOM.exitBtn.disabled = false;
    const isLast = State.currentIdx === State.activeQuestions.length - 1;
    if (State.answers[State.currentIdx] !== null || State.currentSelection.size > 0) {
        DOM.nextBtn.textContent = isLast ? '完成作答' : '下一題';
    } else {
        DOM.nextBtn.textContent = '跳過';
    }
}

function handleNextClick() {
    if (State.answers[State.currentIdx] !== null || State.currentSelection.size === 0) {
        State.currentIdx++;
        State.currentIdx < State.activeQuestions.length ? renderQuestion() : showResult();
    } else {
        submitAnswer();
    }
}

function submitAnswer() {
    const q = State.activeQuestions[State.currentIdx];
    const isMulti = Array.isArray(q.answer);
    const correctArr = isMulti ? q.answer : [q.answer];
    
    const selArr = [...State.currentSelection].sort();
    const isCorrect = selArr.toString() === [...correctArr].sort().toString();

    // Update UI immediately
    DOM.optionsWrap.querySelectorAll('.option').forEach(el => {
        el.classList.add('locked');
        const i = parseInt(el.dataset.i);
        if (correctArr.includes(i)) el.classList.add('correct');
        if (State.currentSelection.has(i) && !correctArr.includes(i)) el.classList.add('wrong');
    });

    // Handle Logic
    updateStats(q.id, isCorrect);
    if (isCorrect) {
        removeWrong(q.id);
        if (State.audioEnabled) playAudio('correct');
        DOM.nextBtn.disabled = true;
        setTimeout(() => {
            handleNextClick();
            DOM.nextBtn.disabled = false;
        }, 900);
    } else {
        saveWrong(q.id);
        if (State.audioEnabled) playAudio('wrong');
        addAIBtn(q);
        updateNextBtnUI();
    }

    State.answers[State.currentIdx] = { ...q, selected: selArr, correct: correctArr, isCorrect, origIdx: State.currentIdx };
    saveProgress();
}

function addAIBtn(q) {
    DOM.expWrap.innerHTML = `<button class="btn btn-ghost w-100 mt-3 ai-btn" style="border-color:var(--wrong)" data-id="${q.id}">🤖 AI 詳解</button>`;
}

// --- 8. Result & Stats Logic ---
function showResult() {
    switchScreen('result');
    const validAns = State.answers.filter(a => a !== null);
    const correctCount = validAns.filter(a => a.isCorrect).length;
    const rate = validAns.length ? Math.round((correctCount / validAns.length) * 100) : 0;
    
    document.getElementById('score-number').textContent = `${correctCount} / ${validAns.length}`;
    const rateEl = document.getElementById('score-percent');
    rateEl.textContent = `答對率：${rate}%`;
    rateEl.style.color = rate >= 80 ? 'var(--correct)' : 'var(--accent)';

    // 播放結算音效
    if (State.audioEnabled) {
        if (rate >= 80) {
            playAudio('cheer');
        } else {
            playAudio('sad');
        }
    }

    // Render Lists
    const resultList = document.getElementById('result-list');
    const keys = ['A','B','C','D','E','F'];
    
    const renderItem = a => `
        <div class="result-item ${a.isCorrect ? 'ok' : 'fail'}">
            <div class="flex-between" style="color:var(--muted); font-size:.8rem; margin-bottom:4px;">
                <span>第 ${a.origIdx + 1} 題</span><span style="color:var(--accent)">${a.topic}</span>
            </div>
            <div>${a.question}</div>
            <div class="flex-between mt-3 font-weight-bold" style="color: ${a.isCorrect ? 'var(--correct)' : 'var(--wrong)'}">
                ${a.isCorrect ? '✓ 答對' : `✗ 答錯 ─ 正解：${a.correct.map(c=>keys[c]).join('、')}`}
                ${!a.isCorrect ? `<button class="btn btn-ghost ai-btn" style="padding:4px 8px; font-size:.7rem" data-id="${a.id}">AI</button>` : ''}
            </div>
        </div>`;
    
    resultList.innerHTML = validAns.filter(a=>!a.isCorrect).map(renderItem).join('') + 
        (correctCount > 0 ? `<div class="list-section mt-3"><div class="list-section-header" onclick="this.parentElement.classList.toggle('active')">顯示答對 (${correctCount})</div><div class="list-section-content">${validAns.filter(a=>a.isCorrect).map(renderItem).join('')}</div></div>` : '');

    // 結果清單的 AI 按鈕事件
    resultList.onclick = (e) => {
        const aiBtn = e.target.closest('.ai-btn');
        if (aiBtn) {
            const id = aiBtn.dataset.id;
            const q = State.globalQuestions.find(item => item.id === id);
            window.openAIPrompt(q);
        }
    };
    
    // Quiz 頁面的 AI 按鈕事件
    DOM.expWrap.onclick = (e) => {
        const aiBtn = e.target.closest('.ai-btn');
        if (aiBtn) {
            const id = aiBtn.dataset.id;
            const q = State.activeQuestions.find(item => item.id === id);
            window.openAIPrompt(q);
        }
    };
}

// --- 9. LocalStorage Helpers ---
function updateStats(id, isCorrect) {
    const stats = Storage.get(Storage.KEYS.STATS, {});
    if (!stats[id]) stats[id] = { t: 0, w: 0 };
    stats[id].t++;
    if (!isCorrect) stats[id].w++;
    Storage.set(Storage.KEYS.STATS, stats);
}
function saveWrong(id) {
    const arr = Storage.get(Storage.KEYS.WRONG, []);
    if (!arr.includes(id)) Storage.set(Storage.KEYS.WRONG, [...arr, id]);
}
function removeWrong(id) {
    Storage.set(Storage.KEYS.WRONG, Storage.get(Storage.KEYS.WRONG, []).filter(i => i !== id));
}
function saveProgress() {
    if (State.activeQuestions.length) {
        Storage.set(Storage.KEYS.PROG, { idx: State.currentIdx, ans: State.answers, qs: State.activeQuestions, comp: State.isComprehensive });
    }
}
function checkProgress() {
    const p = Storage.get(Storage.KEYS.PROG, null);
    if (p) {
        document.getElementById('resume-banner').classList.remove('hidden');
        document.getElementById('resume-yes-btn').onclick = () => {
            State.activeQuestions = p.qs; State.currentIdx = p.idx; State.answers = p.ans; State.isComprehensive = p.comp;
            document.getElementById('resume-banner').classList.add('hidden');
            switchScreen('quiz'); renderQuestion();
        };
        document.getElementById('resume-no-btn').onclick = () => { Storage.remove(Storage.KEYS.PROG); document.getElementById('resume-banner').classList.add('hidden'); };
    }
}

// --- 10. Settings & Theme ---
function initSettings() {
    const theme = Storage.get(Storage.KEYS.THEME, 'dark');
    document.documentElement.setAttribute('data-theme', theme);
    document.querySelectorAll('.theme-option').forEach(el => {
        el.classList.toggle('active', el.dataset.theme === theme);
        el.onclick = () => {
            document.documentElement.setAttribute('data-theme', el.dataset.theme);
            Storage.set(Storage.KEYS.THEME, el.dataset.theme);
            document.querySelectorAll('.theme-option').forEach(o => o.classList.toggle('active', o === el));
        };
    });

    State.audioEnabled = Storage.get(Storage.KEYS.AUDIO, false);
    document.getElementById('audio-status').textContent = State.audioEnabled ? '開啟' : '關閉';
    document.getElementById('audio-toggle-card').onclick = () => {
        State.audioEnabled = !State.audioEnabled;
        Storage.set(Storage.KEYS.AUDIO, State.audioEnabled);
        document.getElementById('audio-status').textContent = State.audioEnabled ? '開啟' : '關閉';
    };

    document.getElementById('settings-btn').onclick = () => document.getElementById('top-bar').classList.toggle('settings-open');
    document.getElementById('settings-back-btn').onclick = () => document.getElementById('top-bar').classList.remove('settings-open');
    document.getElementById('top-bar-toggle').onclick = (e) => {
        document.getElementById('top-bar').classList.toggle('collapsed');
        e.target.textContent = document.getElementById('top-bar').classList.contains('collapsed') ? '▼' : '▲';
    };

    // 清除資料
    const bindClear = (id, key, msg) => {
        document.getElementById(id).onclick = () => { if(confirm(msg)){ key ? Storage.remove(key) : Storage.clearAll(); location.reload(); }};
    };
    bindClear('clear-stats-btn', Storage.KEYS.STATS, '清除統計？');
    bindClear('clear-history-btn', Storage.KEYS.WRONG, '清除錯題？');
    bindClear('clear-all-btn', null, '清除所有設定與資料？');
    bindClear('clear-stats-btn-dash', Storage.KEYS.STATS, '清除統計？');
}

function playAudio(key) {
    if (State.audioEnabled && State.audio[key]) {
        State.audio[key].currentTime = 0;
        State.audio[key].play().catch(() => {});
    }
}

function stopResultAudio() {
    if (State.audio.cheer) { State.audio.cheer.pause(); State.audio.cheer.currentTime = 0; }
    if (State.audio.sad) { State.audio.sad.pause(); State.audio.sad.currentTime = 0; }
}

function playErrorAudio() {
    playAudio('wrong');
}

// --- 11. 題庫瀏覽器邏輯 ---
function initBrowser() {
    const topicFilter = document.getElementById('topic-filter');
    const topics = [...new Set(State.globalQuestions.map(q => q.topic))].sort();
    topicFilter.innerHTML = '<option value="">所有主題</option>' + topics.map(t => `<option value="${t}">${t}</option>`).join('');
    
    // 只綁定一次篩選器事件
    if (!State.browserEventsBound) {
        ['search-input', 'topic-filter', 'diff-filter', 'only-bookmarked', 'only-risky'].forEach(id => {
            document.getElementById(id).addEventListener('input', renderBrowserList);
        });
        
        // 收藏按鈕的事件委派
        document.getElementById('browser-list').onclick = (e) => {
            const btn = e.target.closest('.bookmark-btn');
            const aiBtn = e.target.closest('.ai-btn');
            
            if (btn) {
                const id = btn.dataset.id;
                let bookmarks = Storage.get(Storage.KEYS.BOOKMARKS, []);
                bookmarks = bookmarks.includes(id) ? bookmarks.filter(b => b !== id) : [...bookmarks, id];
                Storage.set(Storage.KEYS.BOOKMARKS, bookmarks);
                renderBrowserList();
            } else if (aiBtn) {
                const id = aiBtn.dataset.id;
                const q = State.globalQuestions.find(item => item.id === id);
                window.openAIPrompt(q);
            }
        };
        State.browserEventsBound = true;
    }
    renderBrowserList();
}

function renderBrowserList() {
    const stats = Storage.get(Storage.KEYS.STATS, {});
    const bookmarks = Storage.get(Storage.KEYS.BOOKMARKS, []);
    const searchTerm = document.getElementById('search-input').value.toLowerCase();
    const targetTopic = document.getElementById('topic-filter').value;
    const targetDiff = document.getElementById('diff-filter').value;
    const onlyBookmarked = document.getElementById('only-bookmarked').checked;
    const onlyRisky = document.getElementById('only-risky').checked;
    const listEl = document.getElementById('browser-list');

    const filtered = State.globalQuestions.filter(q => {
        const s = stats[q.id] || { t: 0, w: 0 };
        const rate = s.t > 0 ? (s.w / s.t) : 0;
        if (searchTerm && !q.question.toLowerCase().includes(searchTerm)) return false;
        if (targetTopic && q.topic !== targetTopic) return false;
        if (targetDiff && q.difficulty !== targetDiff) return false;
        if (onlyBookmarked && !bookmarks.includes(q.id)) return false;
        if (onlyRisky && rate <= 0.5) return false;
        return true;
    });

    if (filtered.length === 0) {
        listEl.innerHTML = '<p class="text-center" style="color:var(--muted)">找不到符合條件的題目。</p>';
        return;
    }

    const keys = ['A','B','C','D','E','F'];
    listEl.innerHTML = filtered.map(q => {
        const s = stats[q.id] || { t: 0, w: 0 };
        const isBookmarked = bookmarks.includes(q.id);
        const correctIndices = Array.isArray(q.answer) ? q.answer : [q.answer];
        const correctText = correctIndices.map(idx => `${keys[idx]}. ${q.options[idx]}`).join('、');

        return `
            <div class="question-card">
                <div class="flex-between" style="align-items:flex-start; margin-bottom:8px;">
                    <div style="font-family:monospace; font-weight:700; color:var(--accent); font-size:0.8rem;">${q.id}</div>
                    <div class="flex-gap" style="flex-wrap:wrap;">
                        ${isBookmarked ? '<span class="badge" style="background:var(--accent-soft); color:var(--accent); margin-bottom:0;">⭐ 已收藏</span>' : ''}
                        ${(s.t > 0 && s.w/s.t > 0.5) ? '<span class="badge" style="background:var(--wrong-soft); color:var(--wrong); margin-bottom:0;">⚠️ 易錯題</span>' : ''}
                    </div>
                </div>
                <div style="font-size:0.95rem; font-weight:600; margin-bottom:12px; line-height:1.5; white-space:pre-wrap;">${Utils.formatText(q.question)}</div>
                <div style="font-size:0.85rem; color:var(--correct); background:var(--correct-soft); padding:8px 12px; border-radius:6px; margin-bottom:12px; border-left:3px solid var(--correct);">正確答案：${correctText}</div>
                <div class="flex-between" style="align-items:flex-end;">
                    <div class="flex-gap" style="font-size:0.75rem; color:var(--muted);"><span>🏷️ ${q.topic}</span><span>📊 ${q.difficulty}</span></div>
                    <div class="flex-gap">
                        <button class="btn-link ai-btn" data-id="${q.id}" style="border:1.5px solid var(--accent); color:var(--accent); padding:4px 12px; border-radius:6px; font-size:0.75rem;">🤖 AI 詳解</button>
                        <button class="btn-link bookmark-btn" data-id="${q.id}" style="border:1.5px solid ${isBookmarked ? 'var(--accent)' : 'var(--border)'}; color:${isBookmarked ? 'var(--accent)' : 'var(--muted)'}; background:${isBookmarked ? 'var(--accent-soft)' : 'none'}; padding:4px 12px; border-radius:6px; font-size:0.75rem;">
                            ${isBookmarked ? '★ 取消' : '☆ 收藏'}
                        </button>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

// --- 12. 學習分析看板邏輯 ---
function renderDashboard() {
    const stats = Storage.get(Storage.KEYS.STATS, {});
    const unitFilter = document.getElementById('dashboard-unit-filter');
    const dashboardContent = document.getElementById('dashboard-content');
    const noDataMsg = document.getElementById('no-data-msg');
    
    // 初始化單元選單
    if (unitFilter.options.length <= 1) {
        const topics = [...new Set(State.globalQuestions.map(q => q.topic))].sort();
        unitFilter.innerHTML = '<option value="">所有單元</option>' + topics.map(t => `<option value="${t}">${t}</option>`).join('');
    }
    
    const targetUnit = unitFilter.value;
    const attemptedIds = Object.keys(stats).filter(id => {
        if (!targetUnit) return true;
        const q = State.globalQuestions.find(i => i.id === id);
        return q && q.topic === targetUnit;
    });

    if (Object.keys(stats).length === 0) {
        dashboardContent.classList.add('hidden');
        noDataMsg.classList.remove('hidden');
        return;
    }
    dashboardContent.classList.remove('hidden');
    noDataMsg.classList.add('hidden');

    // 計算基礎數據
    let filteredAttempts = 0, filteredWrongs = 0;
    attemptedIds.forEach(id => { filteredAttempts += stats[id].t; filteredWrongs += stats[id].w; });
    
    const totalInUnit = targetUnit 
        ? State.globalQuestions.filter(q => q.topic === targetUnit).length
        : State.globalQuestions.length;

    document.getElementById('overall-accuracy').textContent = `${filteredAttempts > 0 ? Math.round(((filteredAttempts - filteredWrongs) / filteredAttempts) * 100) : 0}%`;
    document.getElementById('overall-progress').textContent = `${Math.round((attemptedIds.length / totalInUnit) * 100)}%`;

    // 圓餅圖 (Progress)
    if (State.charts.progress) State.charts.progress.destroy();
    State.charts.progress = new Chart(document.getElementById('progressChart'), {
        type: 'doughnut',
        data: { labels: ['已挑戰', '未挑戰'], datasets: [{ data: [attemptedIds.length, totalInUnit - attemptedIds.length], backgroundColor: ['#7c6dfa', '#23263a'], borderWidth: 0 }] },
        options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#7a7e9a' } } } }
    });

    // 單元表現圖 (Unit Accuracy)
    const unitStats = {};
    const topics = targetUnit ? [targetUnit] : [...new Set(State.globalQuestions.map(q => q.topic))].sort();
    
    topics.forEach(t => {
        const qIds = State.globalQuestions.filter(q => q.topic === t).map(q => q.id);
        const attemptedInUnit = qIds.filter(id => stats[id]);
        let uT = 0, uW = 0;
        attemptedInUnit.forEach(id => { uT += stats[id].t; uW += stats[id].w; });
        unitStats[t] = { acc: uT > 0 ? ((uT - uW) / uT * 100) : 0, prog: (attemptedInUnit.length / qIds.length * 100) };
    });

    if (State.charts.unit) State.charts.unit.destroy();
    State.charts.unit = new Chart(document.getElementById('unitChart'), {
        type: 'radar',
        data: {
            labels: topics.map(t => t.length > 8 ? t.substring(0, 8) + '...' : t),
            datasets: [
                { label: '正確率 (%)', data: topics.map(t => unitStats[t].acc), borderColor: '#4caf87', backgroundColor: 'rgba(76,175,135,0.2)', pointBackgroundColor: '#4caf87' },
                { label: '完成度 (%)', data: topics.map(t => unitStats[t].prog), borderColor: '#7c6dfa', backgroundColor: 'rgba(124,109,250,0.2)', pointBackgroundColor: '#7c6dfa' }
            ]
        },
        options: {
            maintainAspectRatio: false,
            scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: '#2d3148' }, angleLines: { color: '#2d3148' }, pointLabels: { color: '#7a7e9a', font: { size: 10 } } } },
            plugins: { legend: { position: 'bottom', labels: { color: '#7a7e9a', boxWidth: 12 } } }
        }
    });

    // 長條圖 (Risk)
    const sortedData = attemptedIds
        .map(id => {
            const s = stats[id];
            return { id, rate: (s.w / s.t * 100), q: State.globalQuestions.find(i => i.id === id) };
        })
        .sort((a, b) => b.rate - a.rate).slice(0, 10);

    if (State.charts.risk) State.charts.risk.destroy();
    State.charts.risk = new Chart(document.getElementById('riskChart'), {
        type: 'bar',
        data: { labels: sortedData.map(d => d.id), datasets: [{ label: '錯誤率 (%)', data: sortedData.map(d => d.rate), backgroundColor: sortedData.map(d => d.rate > 70 ? '#e05c6e' : '#f59e0b'), borderRadius: 5 }] },
        options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { max: 100, ticks: { color: '#7a7e9a' }, grid: { color: '#2d3148' } }, y: { ticks: { color: '#7a7e9a' }, grid: { display: false } } } }
    });

    // 完整清單
    document.getElementById('full-analysis-list').innerHTML = attemptedIds
        .map(id => ({ id, rate: (stats[id].w / stats[id].t * 100), ...stats[id], text: State.globalQuestions.find(i => i.id === id)?.question || id }))
        .sort((a, b) => b.rate - a.rate)
        .map(item => `
            <div class="flex-between" style="padding:12px; border-bottom:1px solid var(--border);">
                <div style="flex:1;">
                    <div style="font-weight:700; color:var(--accent); font-size:0.8rem;">${item.id} <span style="font-weight:normal; color:var(--muted); font-size:0.7rem;">(錯 ${item.w} / 共 ${item.t})</span></div>
                    <div style="font-size:0.9rem; margin-top:4px; display:-webkit-box; -webkit-line-clamp:2; line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${item.text}</div>
                </div>
                <div style="text-align:right; margin-left:16px; min-width:80px;">
                    <div style="color:${item.rate > 50 ? 'var(--wrong)' : 'var(--correct)'}; font-weight:700; font-size:1rem;">${Math.round(item.rate)}%</div>
                </div>
            </div>
        `).join('');
}

init();
</script>
