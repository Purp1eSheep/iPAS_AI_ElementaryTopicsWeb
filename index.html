<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <link rel="stylesheet" href="src/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<header id="top-bar">
    <div class="top-bar-content">
        <a href="https://github.com/Purp1eSheep/iPAS_AI_ElementaryTopicsWeb" target="_blank" class="btn-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            GitHub Repo
        </a>
        <button id="settings-btn" class="btn-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            設定
        </button>
    </div>

    <div id="settings-dropdown" class="settings-dropdown">
        <div class="settings-content">
            <h1>⚙️ 設定</h1>
            <div class="mt-3 mb-3">
                <div class="challenge-title">主題選擇</div>
                <div class="theme-grid" id="theme-grid">
                    <div class="theme-option" data-theme="dark">深色</div>
                    <div class="theme-option" data-theme="light">淺色</div>
                    <div class="theme-option" data-theme="charcoal">炭黑</div>
                    <div class="theme-option" data-theme="twilight">暮藍</div>
                    <div class="theme-option" data-theme="slate-purple">石板</div>
                    <div class="theme-option" data-theme="nord">北歐</div>
                </div>
                <p id="theme-description" class="text-center"></p>
            </div>
            <div class="mb-3">
                <div class="challenge-title">功能設定</div>
                <div id="audio-toggle-card" class="quiz-card flex-between">
                    <div class="name">🔥 BrainRot mode</div>
                    <div id="audio-status" class="meta"></div>
                </div>
            </div>
            <div class="flex-col mb-3">
                <div class="challenge-title">資料管理</div>
                <button id="clear-stats-btn" class="btn btn-ghost btn-danger">📊 清除統計數據</button>
                <button id="clear-history-btn" class="btn btn-ghost btn-danger">❌ 清除錯題標記</button>
                <button id="clear-all-btn" class="btn btn-ghost btn-danger">🔥 清除所有資料</button>
            </div>
            <button id="settings-back-btn" class="btn btn-primary mt-3">返回</button>
        </div>
    </div>
    <button id="top-bar-toggle" class="top-bar-toggle">▲</button>
</header>

<main id="app">
    <section id="select-screen" class="screen card active">
        <h1>📝 Quiz</h1>
        <p class="mb-3">選擇題目集，然後開始作答</p>
        
        <div id="resume-banner" class="flex-between mb-3 hidden" style="background:var(--accent-soft); border:1px solid var(--accent); padding:16px; border-radius:var(--radius);">
            <span style="color:var(--accent); font-weight:600;">👋 偵測到未完成進度</span>
            <div class="flex-gap">
                <button id="resume-yes-btn" class="btn btn-primary" style="padding:6px 12px; width:auto;">恢復</button>
                <button id="resume-no-btn" class="btn btn-ghost" style="padding:6px 12px; width:auto;">放棄</button>
            </div>
        </div>

        <div id="quiz-list" class="flex-col mb-3"><p class="text-center">載入中…</p></div>
        
        <div class="flex-gap mb-3">
            <button id="browse-btn" class="btn btn-ghost w-100">🔍 瀏覽全部題庫</button>
            <button id="analysis-btn" class="btn btn-ghost w-100">📊 學習分析看板</button>
        </div>
        <button id="start-btn" class="btn btn-primary" disabled>開始作答 →</button>
    </section>

    <section id="browser-screen" class="screen">
        <div class="card">
            <div class="flex-between mb-3">
                <h1 style="margin:0;">📚 題庫瀏覽器</h1>
                <button id="browser-back-btn" class="btn btn-ghost" style="padding: 8px 16px;">返回</button>
            </div>
            <div class="filter-panel">
                <input type="text" id="search-input" placeholder="搜尋關鍵字..." style="grid-column:span 2;">
                <select id="topic-filter"><option value="">所有主題</option></select>
                
                <div style="grid-column:span 2;" class="flex-gap">
                    <label><input type="checkbox" id="only-bookmarked"> ⭐ 只看收藏</label>
                    <label><input type="checkbox" id="only-risky"> ⚠️ 只看易錯題</label>
                </div>
            </div>
            <div id="browser-list" class="browser-list"></div>
        </div>
    </section>

    <section id="quiz-screen" class="screen">
        <div class="card">
            <div class="flex-between mb-3">
                <div class="progress-wrap"><div id="progress-bar" class="progress-bar" style="width:0%"></div></div>
                <span id="q-counter" style="font-size:.82rem; color:var(--muted); white-space:nowrap; margin-left:12px;"></span>
            </div>
            <div>
                <span id="type-badge" class="badge badge-primary"></span>
                <span id="topic-badge" class="badge badge-secondary"></span>
            </div>
            <h2 id="question-text"></h2>
            <div id="options" class="options"></div>
            <div class="flex-gap">
                <button id="exit-btn" class="btn btn-ghost btn-danger" style="flex: 0 0 80px;">退出</button>
                <button id="prev-btn" class="btn btn-ghost w-100">上一題</button>
                <button id="next-btn" class="btn btn-primary w-100">下一題</button>
            </div>
            <div id="explanation-container" class="mt-3"></div>
        </div>
    </section>

    <section id="result-screen" class="screen card">
        <h1>結果</h1>
        <div class="score-ring text-center">
            <div id="score-number" class="score-number">—</div>
            <div id="score-percent" style="font-size:1.2rem; font-weight:700;"></div>
            <div style="color:var(--muted); font-size:.9rem;">答對題數</div>
        </div>
        <div id="result-message" class="text-center" style="font-size:1.4rem; font-weight:700; color:var(--wrong); margin-bottom:20px;"></div>
        <div class="text-center mb-3"><button id="cancel-redirect-btn" class="btn btn-danger hidden">我不要當兵</button></div>
        
        <div id="weakness-analysis" class="dashboard-stat-card mb-3 hidden">
            <div class="challenge-title">📊 弱點分析</div>
            <div id="weakness-list"></div>
        </div>
        <div id="result-list" class="flex-col mb-3"></div>
        <button id="back-btn" class="btn btn-primary">返回主畫面</button>
    </section>
</main>

<div id="analysis-modal" class="modal">
    <div class="modal-content" style="max-width: 800px;">
        <div class="flex-between mb-3">
            <h2>📈 大數據學習分析看板</h2>
            <button class="close-modal" id="close-analysis">&times;</button>
        </div>
        <div class="filter-panel" style="margin-bottom: 20px; grid-template-columns: 1fr;">
            <select id="dashboard-unit-filter"><option value="">所有單元</option></select>
        </div>
        <div id="dashboard-content">    
            <div class="dashboard-grid">
                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:20px;">
                    <div class="dashboard-stat-card text-center">
                        <div id="overall-accuracy" style="font-size:2.5rem; font-weight:800; color:var(--accent);">—</div>
                        <div style="color:var(--muted); font-size:.85rem;">目前正確率 (已答)</div>
                    </div>
                    <div class="dashboard-stat-card text-center">
                        <div id="overall-progress" style="font-size:2.5rem; font-weight:800; color:var(--accent);">—</div>
                        <div style="color:var(--muted); font-size:.85rem;">題庫完成度</div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:20px;">
                    <div class="dashboard-stat-card"><div class="challenge-title">📌 進度概覽</div><div class="chart-container"><canvas id="progressChart"></canvas></div></div>
                    <div class="dashboard-stat-card"><div class="challenge-title">📊 各單元表現</div><div class="chart-container"><canvas id="unitChart"></canvas></div></div>
                </div>
                <div class="dashboard-stat-card"><div class="challenge-title">🚩 易錯 Top 10</div><div class="chart-container"><canvas id="riskChart"></canvas></div></div>
                <div class="dashboard-stat-card">
                    <div class="challenge-title">📋 完整數據清單</div>
                    <div class="scrollable-list" id="full-analysis-list"></div>
                </div>
            </div>
        </div>
        <div id="no-data-msg" class="text-center mt-3 hidden">尚未有紀錄，快開始吧！</div>
        <div class="flex-col mt-3">
            <div class="challenge-title">📤 歷史錯題分析 (給 AI)</div>
            <button id="prepare-export-btn" class="btn btn-primary w-100">生成錯題分析資料</button>
        </div>
        <div class="flex-gap mt-3">
            <button id="clear-stats-btn-dash" class="btn btn-ghost btn-danger w-100">🔥 清除數據</button>
            <button id="analysis-close-btn" class="btn btn-primary w-100">關閉</button>
        </div>
    </div>
</div>

<div id="export-modal" class="modal">
    <div class="modal-content" style="max-width: 800px;">
        <div class="flex-between mb-3">
            <h2>📤 錯題匯出預覽</h2>
            <button class="close-modal" id="close-export">&times;</button>
        </div>
        <p class="mb-3">您可以直接複製下方文字給 AI 進行分析，或下載結構化檔案。</p>
        <div style="background:var(--surface2); padding:15px; border-radius:8px; border:1px solid var(--border); margin-bottom: 20px;">
            <textarea id="export-preview-text" style="width:100%; height:300px; background:transparent; border:none; color:var(--text); resize:none; outline:none; font-family: monospace; font-size: 0.9rem;" readonly></textarea>
        </div>
        <div class="flex-gap">
            <button id="copy-export-btn" class="btn btn-ghost w-100">📋 複製文字</button>
            <button id="download-json-btn" class="btn btn-primary w-100">📥 下載 JSON</button>
            <button id="download-csv-btn" class="btn btn-primary w-100">📥 下載 CSV</button>
        </div>
    </div>
</div>

<div id="ai-modal" class="modal">
    <div class="modal-content">
        <div class="flex-between mb-3">
            <h2>🤖 AI 詳解助教</h2>
            <button class="close-modal" id="close-ai">&times;</button>
        </div>
        <div style="background:var(--surface2); padding:15px; border-radius:8px; border:1px solid var(--border);">
            <textarea id="ai-prompt-text" style="width:100%; height:200px; background:transparent; border:none; color:var(--text); resize:none; outline:none;" readonly></textarea>
        </div>
        <div class="flex-gap mt-3" style="justify-content:flex-end;">
            <button class="btn btn-ghost" id="copy-ai-prompt">複製</button>
            <button class="btn btn-primary" id="close-ai-btn">關閉</button>
        </div>
    </div>
</div>

<div id="toast-container" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; display: flex; flex-direction: column; gap: 10px; align-items: center;"></div>

<div id="confirm-modal" class="modal">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <h2 id="confirm-title" style="margin-bottom: 12px;">確認</h2>
        <p id="confirm-msg" style="margin-bottom: 24px; color: var(--text);"></p>
        <div class="flex-gap">
            <button id="confirm-cancel-btn" class="btn btn-ghost w-100">取消</button>
            <button id="confirm-yes-btn" class="btn btn-primary w-100" style="background: var(--wrong);">確定</button>
        </div>
    </div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
