<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ✏️ 改這裡換掉標籤頁標題 -->
    <title>Quiz</title>
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* Default Dark Theme */
            --bg:           #0f1117;
            --surface:      #1a1d27;
            --surface2:     #23263a;
            --border:       #2d3148;
            --accent:       #7c6dfa;
            --accent-soft:  rgba(124,109,250,.15);
            --text:         #e8eaf0;
            --muted:        #7a7e9a;
            --correct:      #4caf87;
            --correct-soft: rgba(76,175,135,.15);
            --wrong:        #e05c6e;
            --wrong-soft:   rgba(224,92,110,.15);
            --radius:       14px;
            --transition:   .2s ease;
            --theme-desc-color: #ffffff;
        }

        [data-theme="light"] {
            --bg:           #f4f5f7;
            --surface:      #ffffff;
            --surface2:     #eef0f5;
            --border:       #d1d5db;
            --accent:       #5850ec;
            --accent-soft:  rgba(88,80,236,.1);
            --text:         #1f2937;
            --muted:        #6b7280;
            --correct:      #059669;
            --correct-soft: rgba(5,150,105,.1);
            --wrong:        #dc2626;
            --wrong-soft:   rgba(220,38,38,.1);
            --theme-desc-color: #000000;
        }

        [data-theme="ocean"] {
            --bg:           #0a192f;
            --surface:      #112240;
            --surface2:     #1d2d50;
            --border:       #233554;
            --accent:       #64ffda;
            --accent-soft:  rgba(100,255,218,.1);
            --text:         #ccd6f6;
            --muted:        #8892b0;
            --correct:      #10b981;
            --correct-soft: rgba(16,185,129,.1);
            --wrong:        #f43f5e;
            --wrong-soft:   rgba(244,63,94,.1);
            --theme-desc-color: #64ffda;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            transition: background var(--transition), color var(--transition);
        }

        /* Top Bar */
        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background var(--transition);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        #top-bar.collapsed {
            transform: translateY(-100%);
        }
        .top-bar-content {
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        .settings-dropdown {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease, background var(--transition);
            background: var(--surface);
        }
        .settings-open .settings-dropdown {
            max-height: 100vh;
            overflow-y: auto;
            border-top: 1px solid var(--border);
        }
        .settings-content {
            padding: 32px 24px;
            max-width: 680px;
            margin: 0 auto;
            width: 100%;
        }
        .top-bar-toggle {
            position: absolute;
            bottom: -24px;
            right: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: none;
            color: var(--muted);
            padding: 2px 16px;
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .settings-open .top-bar-toggle { visibility: hidden; }
        .top-bar-toggle:hover { color: var(--accent); background: var(--surface2); }
        .top-bar-links { display: flex; gap: 20px; align-items: center; }
        .top-bar-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .top-bar-link:hover { color: var(--accent); }
        
        .settings-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .settings-btn:hover { color: var(--text); }

        #app { width: 100%; max-width: 680px; margin-top: 40px; }

        .screen { display: none; }
        .screen.active { display: block; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            transition: background var(--transition), border var(--transition);
        }

        h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
        h2 { font-size: 1.25rem; font-weight: 600; line-height: 1.5; margin-bottom: 20px; white-space: pre-wrap; }
        p  { color: var(--muted); font-size: .95rem; line-height: 1.6; }

        #select-screen .subtitle { margin-bottom: 28px; margin-top: 6px; }

        /* Settings Screen Styles */
        .settings-group { margin-bottom: 24px; }
        .settings-group-title { 
            font-size: 0.85rem; 
            color: var(--accent); 
            font-weight: 700; 
            margin-bottom: 12px; 
            text-transform: uppercase;
        }
        .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
        .theme-option {
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all var(--transition);
        }
        .theme-option:hover { border-color: var(--accent); }
        .theme-option.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
        #theme-description {
            color: var(--theme-desc-color);
            font-weight: 500;
            font-size: 0.95rem;
            transition: color var(--transition);
        }

        .quiz-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
        .list-section { 
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 8px;
        }
        .list-section-header { 
            background: var(--surface2);
            padding: 14px 20px;
            font-size: 0.9rem; 
            color: var(--text); 
            font-weight: 700; 
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background var(--transition);
        }
        .list-section-header:hover { background: var(--border); }
        .list-section-header::after {
            content: '▼';
            font-size: 0.7rem;
            color: var(--muted);
            transition: transform 0.3s;
        }
        .list-section.active .list-section-header::after { transform: rotate(180deg); }
        
        .list-section-content { 
            display: none; 
            padding: 10px;
            flex-direction: column;
            gap: 8px;
            background: rgba(0,0,0,0.1);
        }
        .list-section.active .list-section-content { display: flex; }

        .quiz-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all var(--transition);
            user-select: none;
        }
        .quiz-card:hover { border-color: var(--accent); transform: translateX(4px); }
        .quiz-card.selected { border-color: var(--accent); background: var(--accent-soft); }
        .quiz-card .name { font-weight: 600; font-size: 0.95rem; }
        .quiz-card .meta { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

        /* 挑戰區塊不需要收摺，維持原樣 */
        .challenge-section { margin-bottom: 16px; }
        .challenge-title { 
            font-size: 0.85rem; 
            color: var(--accent); 
            font-weight: 700; 
            margin-bottom: 8px;
            padding-left: 4px;
            text-transform: uppercase;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity var(--transition), transform var(--transition);
        }
        .btn:active { transform: scale(.97); }
        .btn-primary { background: var(--accent); color: #fff; width: 100%; }
        .btn-primary:hover { opacity: .88; }
        .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
        .btn-ghost {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

        .quiz-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 12px;
        }

        .progress-wrap {
            flex: 1;
            height: 6px;
            background: var(--surface2);
            border-radius: 99px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 99px;
            transition: width .4s ease;
        }

        .q-counter { font-size: .82rem; color: var(--muted); white-space: nowrap; }

        .type-badge {
            font-size: .72rem;
            padding: 3px 10px;
            border-radius: 99px;
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 16px;
            display: inline-block;
        }
        .topic-badge {
            font-size: .72rem;
            padding: 3px 10px;
            border-radius: 99px;
            background: var(--surface2);
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 16px;
            margin-left: 8px;
            display: inline-block;
        }

        .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

        .option {
            background: var(--surface2);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            cursor: pointer;
            transition: border-color var(--transition), background var(--transition);
            display: flex;
            align-items: center;
            gap: 14px;
            user-select: none;
        }
        .option:hover:not(.locked) { border-color: var(--accent); }
        .option.selected { border-color: var(--accent); background: var(--accent-soft); }
        .option.correct  { border-color: var(--correct); background: var(--correct-soft); }
        .option.wrong    { border-color: var(--wrong);   background: var(--wrong-soft); }

        .option-key {
            width: 28px; height: 28px;
            border-radius: 7px;
            background: var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: .78rem; font-weight: 700;
            flex-shrink: 0;
            transition: background var(--transition), color var(--transition);
        }
        .option.selected .option-key { background: var(--accent); color: #fff; }
        .option.correct  .option-key { background: var(--correct); color: #fff; }
        .option.wrong    .option-key { background: var(--wrong);   color: #fff; }
        .option-text { font-size: .95rem; line-height: 1.5; }

        .score-ring {
            display: flex; flex-direction: column; align-items: center;
            margin: 28px 0 32px; gap: 6px;
        }
        .score-number { font-size: 3.5rem; font-weight: 800; line-height: 1; }
        .score-label  { color: var(--muted); font-size: .9rem; }

        #result-message {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--wrong);
        }
        #redirect-control {
            text-align: center;
            margin-bottom: 24px;
        }
        #cancel-redirect-btn {
            background: var(--wrong);
            color: white;
            padding: 10px 20px;
            border-radius: var(--radius);
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: none;
        }

        /* 弱點分析 */
        .weakness-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 28px;
        }
        .weakness-title { font-weight: 700; font-size: 1rem; margin-bottom: 12px; color: var(--accent); }
        .weakness-item {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; font-size: .85rem;
        }
        .weakness-bar-bg { flex: 1; height: 4px; background: var(--border); margin: 0 12px; border-radius: 2px; position: relative; }
        .weakness-bar-fg { height: 100%; background: var(--accent); border-radius: 2px; }
        .weakness-name { width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .weakness-score { width: 40px; text-align: right; font-weight: 600; }

        .result-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
        .result-item {
            background: var(--surface2);
            border-radius: 10px;
            padding: 14px 18px;
            border-left: 4px solid var(--border);
            font-size: .9rem;
        }
        .result-item.ok   { border-color: var(--correct); }
        .result-item.fail { border-color: var(--wrong); }
        .result-item .ri-q { color: var(--muted); font-size: .82rem; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .result-item .ri-topic { font-size: .75rem; color: var(--accent); opacity: 0.8; }
        .result-item .ri-status { font-weight: 600; font-size: .82rem; margin-top: 6px; }
        .result-item.ok   .ri-status { color: var(--correct); }
        .result-item.fail .ri-status { color: var(--wrong); }

        /* 正確題目收摺 */
        .correct-answers-section {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-top: 10px;
        }
        .correct-answers-header {
            background: var(--surface2);
            padding: 14px 20px;
            font-size: 0.9rem;
            color: var(--correct);
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .correct-answers-header::after {
            content: '▼';
            font-size: 0.7rem;
            color: var(--muted);
            transition: transform 0.3s;
        }
        .correct-answers-section.active .correct-answers-header::after { transform: rotate(180deg); }
        .correct-answers-content {
            display: none;
            padding: 10px;
            flex-direction: column;
            gap: 10px;
            background: rgba(0,0,0,0.1);
        }
        .correct-answers-section.active .correct-answers-content { display: flex; }

        /* 調整按鈕列，讓退出按鈕較短 */
        .quiz-actions { display: flex; gap: 10px; }
        .quiz-actions #exit-btn { 
            flex: 0 0 80px; 
            padding: 12px 0; 
            font-size: 0.9rem; 
            color: var(--wrong);
            border: 1px solid var(--wrong);
        }
        .quiz-actions #exit-btn:hover {
            background: var(--wrong-soft);
            color: var(--wrong);
            border-color: var(--wrong);
        }
        .quiz-actions #next-btn { flex: 1; }

        /* 學習分析 Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .close-modal {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .close-modal:hover { color: var(--text); }

        /* 詳解區塊 */
        .explanation-box {
            margin-top: 16px;
            padding: 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: none;
        }
        .explanation-box.active { display: block; }
        .prompt-text {
            font-family: monospace;
            font-size: 0.85rem;
            background: var(--bg);
            padding: 12px;
            border-radius: 6px;
            margin: 12px 0;
            white-space: pre-wrap;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .copy-btn {
            background: var(--accent-soft);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 600;
            transition: all var(--transition);
        }
        .copy-btn:hover { background: var(--accent); color: white; }

        .analysis-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        .analysis-item:last-child { border-bottom: none; }
        .analysis-info { flex: 1; }
        .analysis-id { font-weight: 700; color: var(--accent); font-size: 0.8rem; }
        .analysis-text { 
            font-size: 0.9rem; 
            margin-top: 4px; 
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .analysis-stat { text-align: right; margin-left: 16px; min-width: 80px; }
        .analysis-rate { color: var(--wrong); font-weight: 700; font-size: 1rem; }
        .analysis-count { font-size: 0.75rem; color: var(--muted); }

        /* 進度恢復提示 */
        #resume-banner {
            display: none;
            background: var(--accent-soft);
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 20px;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        #resume-banner span { font-size: 0.9rem; font-weight: 600; color: var(--accent); }

        /* 看板專用樣式 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            margin-top: 20px;
        }
        .dashboard-stat-card {
            background: var(--surface2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .stat-value { font-size: 2.5rem; font-weight: 800; color: var(--accent); line-height: 1; }
        .stat-label { font-size: 0.85rem; color: var(--muted); margin-top: 8px; }
        
        .chart-container {
            position: relative;
            height: 260px;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .scrollable-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(0,0,0,0.1);
        }
        .scrollable-list::-webkit-scrollbar { width: 6px; }
        .scrollable-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .btn-row { display: flex; gap: 10px; }
        .btn-row .btn { flex: 1; }

        .toast { text-align: center; padding: 20px; color: var(--muted); }
        .toast.error { color: var(--wrong); }

        /* 全局題庫瀏覽器樣式 */
        #browser-screen .card { padding: 24px; }
        .filter-panel {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .filter-panel input, .filter-panel select {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .filter-panel .full-width { grid-column: span 2; }
        .filter-options {
            grid-column: span 2;
            display: flex;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--muted);
            align-items: center;
        }
        .filter-options input[type="checkbox"] { width: auto; }

        .browser-list {
            max-height: 60vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 4px;
        }
        .browser-list::-webkit-scrollbar { width: 6px; }
        .browser-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .question-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            position: relative;
            transition: border-color var(--transition);
        }
        .question-card:hover { border-color: var(--accent); }
        .q-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .q-id { font-family: monospace; font-weight: 700; color: var(--accent); font-size: 0.8rem; }
        .q-badges { display: flex; gap: 6px; flex-wrap: wrap; }
        .badge-mini { font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
        .badge-bookmark { background: var(--accent-soft); color: var(--accent); }
        .badge-risk { background: var(--wrong-soft); color: var(--wrong); }
        
        .q-text { font-size: 0.95rem; font-weight: 600; margin-bottom: 12px; line-height: 1.5; white-space: pre-wrap; }
        .ri-text { white-space: pre-wrap; margin-bottom: 8px; }

<script>
/* =============================================================
      設定
      MANIFEST_PATH: 題目清單的路徑，通常不需要改
      ============================================================= */
const MANIFEST_PATH = 'data/manifest.json';

/* 格式化題目文本：針對 A. B. C. D. 等標記自動換行 (僅限 ABCD 與 abcd) */
function formatQuestionText(text) {
    if (!text) return "";
    return text.replace(/ ([A-Da-d]\.)/g, '\n$1');
}

/* 狀態 */
let quizSets  = [];
let globalQuestions = []; // 快取所有題目
let questions = [];
let current   = 0;
let answers   = [];
let selected  = new Set();
let isComprehensive = false;
let redirectTimer = null;
let previousScreen = 'select';
let isSettingsOpen = false;

/* 音效設定 (New Feature) */
const AUDIO_SETTING_KEY = 'quiz_audio_wrong';
let audioEnabled = localStorage.getItem(AUDIO_SETTING_KEY) === 'true';

function updateAudioUI() {
    const statusEl = document.getElementById('audio-status');
    const cardEl = document.getElementById('audio-toggle-card');
    if (statusEl) statusEl.textContent = audioEnabled ? '已開啟' : '已關閉';
    if (cardEl) cardEl.classList.toggle('selected', audioEnabled);
}

document.getElementById('audio-toggle-card').onclick = () => {
    audioEnabled = !audioEnabled;
    localStorage.setItem(AUDIO_SETTING_KEY, audioEnabled);
    updateAudioUI();
};
updateAudioUI();

/* 收藏管理 (New Feature) */
const BOOKMARKS_KEY = 'quiz_bookmarks';
function getBookmarks() {
    return JSON.parse(localStorage.getItem(BOOKMARKS_KEY) || '[]');
}
function toggleBookmark(id) {
    let bookmarks = getBookmarks();
    const index = bookmarks.indexOf(id);
    if (index > -1) {
        bookmarks.splice(index, 1);
    } else {
        bookmarks.push(id);
    }
    localStorage.setItem(BOOKMARKS_KEY, JSON.stringify(bookmarks));
    // 如果在瀏覽器畫面，即時更新列表外觀
    if (screens.browser.classList.contains('active')) {
        renderBrowserList();
    }
}

/* 答題進度管理 (New Feature 1) */
const PROGRESS_KEY = 'quiz_current_progress';

function saveProgress() {
    if (screens.quiz.classList.contains('active') && questions.length > 0) {
        const data = {
            currentIndex: current,
            userAnswers: answers, // 包含已提交的答案
            questions: questions, // 儲存當前打散後的題目順序
            isComprehensive: isComprehensive
        };
        localStorage.setItem(PROGRESS_KEY, JSON.stringify(data));
    }
}

function loadProgress() {
    const saved = localStorage.getItem(PROGRESS_KEY);
    return saved ? JSON.parse(saved) : null;
}

function clearProgress() {
    localStorage.removeItem(PROGRESS_KEY);
}

function checkProgress() {
    const saved = loadProgress();
    const banner = document.getElementById('resume-banner');
    if (saved) {
        banner.style.display = 'flex';
        document.getElementById('resume-yes-btn').onclick = () => {
            questions = saved.questions;
            current = saved.currentIndex;
            answers = saved.userAnswers;
            isComprehensive = saved.isComprehensive;
            banner.style.display = 'none';
            showScreen('quiz');
            renderQuestion();
        };
        document.getElementById('resume-no-btn').onclick = () => {
            clearProgress();
            banner.style.display = 'none';
        };
    }
}

/* 錯題與統計管理 */
const WRONG_QS_KEY = 'quiz_wrong_questions';
const STATS_KEY = 'quiz_stats';

function getWrongQuestions() {
    return JSON.parse(localStorage.getItem(WRONG_QS_KEY) || '[]');
}
function saveWrongQuestion(id) {
    let wrong = getWrongQuestions();
    if (!wrong.includes(id)) {
        wrong.push(id);
        localStorage.setItem(WRONG_QS_KEY, JSON.stringify(wrong));
    }
}
function removeWrongQuestion(id) {
    let wrong = getWrongQuestions();
    const index = wrong.indexOf(id);
    if (index > -1) {
        wrong.splice(index, 1);
        localStorage.setItem(WRONG_QS_KEY, JSON.stringify(wrong));
    }
}

// 統計數據：{"Q001": {"total": 5, "wrong": 2}}
function getStats() {
    return JSON.parse(localStorage.getItem(STATS_KEY) || '{}');
}
function updateStats(id, isCorrect) {
    let stats = getStats();
    if (!stats[id]) stats[id] = { total: 0, wrong: 0 };
    stats[id].total++;
    if (!isCorrect) stats[id].wrong++;
    localStorage.setItem(STATS_KEY, JSON.stringify(stats));
}

function clearWrongQuestions() {
    localStorage.removeItem(WRONG_QS_KEY);
    alert('錯題標記已清除');
    location.reload();
}
function clearStats() {
    localStorage.removeItem(STATS_KEY);
    alert('統計數據已清除');
    location.reload();
}
function clearAllData() {
    localStorage.clear();
    alert('所有資料已清除');
    location.reload();
}

/* 主題管理 */
const THEME_KEY = 'quiz_theme';
function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem(THEME_KEY, theme);
    updateThemeUI(theme);
}
function updateThemeUI(theme) {
    document.querySelectorAll('.theme-option').forEach(opt => {
        opt.classList.toggle('active', opt.dataset.theme === theme);
    });
    
    const themeDesc = document.getElementById('theme-description');
    if (theme === 'dark') {
        themeDesc.textContent = '探索深邃的暗夜脈動，專注於智慧的閃光。';
    } else if (theme === 'ocean') {
        themeDesc.textContent = '徜徉在無垠的湛藍深處，探索知識的邊際。';
    } else if (theme === 'light') {
        themeDesc.textContent = '你有病';
    }
}
// 初始化主題
const savedTheme = localStorage.getItem(THEME_KEY) || 'dark';
setTheme(savedTheme);

/* Top Bar Toggle */
const topBar = document.getElementById('top-bar');
const topBarToggle = document.getElementById('top-bar-toggle');
topBarToggle.onclick = () => {
    topBar.classList.toggle('collapsed');
    topBarToggle.textContent = topBar.classList.contains('collapsed') ? '▼' : '▲';
};

/* Settings Logic */
const settingsBtn = document.getElementById('settings-btn');
const settingsDropdown = document.getElementById('settings-dropdown');

function toggleSettings(forceClose = false) {
    if (forceClose) {
        isSettingsOpen = false;
    } else {
        isSettingsOpen = !isSettingsOpen;
    }
    
    topBar.classList.toggle('settings-open', isSettingsOpen);
    
    // 如果開啟設定，確保 top bar 不是收起狀態
    if (isSettingsOpen) {
        topBar.classList.remove('collapsed');
        topBarToggle.textContent = '▲';
    }
}

settingsBtn.onclick = () => toggleSettings();
document.getElementById('settings-back-btn').onclick = () => toggleSettings(true);

/* 畫面切換 */
const screens = {
    select: document.getElementById('select-screen'),
    browser: document.getElementById('browser-screen'),
    quiz:   document.getElementById('quiz-screen'),
    result: document.getElementById('result-screen'),
};
function showScreen(name) {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
    // 如果開啟了設定，切換畫面時自動關閉
    toggleSettings(true);
}

document.querySelectorAll('.theme-option').forEach(opt => {
    opt.onclick = () => setTheme(opt.dataset.theme);
});

document.getElementById('clear-history-btn').onclick = () => {
    if (confirm('是否要清除所有錯題標記？')) {
        clearWrongQuestions();
    }
};
document.getElementById('clear-stats-btn').onclick = () => {
    if (confirm('是否要清除所有答題統計數據？')) {
        clearStats();
    }
};
document.getElementById('clear-all-btn').onclick = () => {
    if (confirm('確定要清除「所有」應用程式資料嗎？這將包含您的主題設定與所有練習紀錄。')) {
        clearAllData();
    }
};

/* 學習分析 UI 控制 (New Feature 2) */
const analysisModal = document.getElementById('analysis-modal');
const analysisBtn = document.getElementById('analysis-btn');
const closeAnalysis = document.getElementById('close-analysis');
const analysisCloseBtn = document.getElementById('analysis-close-btn');

let progressChart = null;
let riskChart = null;

analysisBtn.onclick = () => {
    renderDashboard();
    analysisModal.classList.add('active');
};
closeAnalysis.onclick = () => analysisModal.classList.remove('active');
analysisCloseBtn.onclick = () => analysisModal.classList.remove('active');
document.getElementById('clear-stats-btn-dash').onclick = () => {

function renderDashboard() {
    const stats = getStats();
    const dashboardContent = document.getElementById('dashboard-content');
    const noDataMsg = document.getElementById('no-data-msg');
    
    const attemptedIds = Object.keys(stats);
    if (attemptedIds.length === 0) {
        dashboardContent.style.display = 'none';
        noDataMsg.style.display = 'block';
        return;
    }
    dashboardContent.style.display = 'block';
    noDataMsg.style.display = 'none';

    // 1. 總體正確率
    let totalAttempts = 0;
    let totalWrongs = 0;
    attemptedIds.forEach(id => {
        totalAttempts += stats[id].total;
        totalWrongs += stats[id].wrong;
    });
    const accuracy = totalAttempts > 0 ? Math.round(((totalAttempts - totalWrongs) / totalAttempts) * 100) : 0;
    document.getElementById('overall-accuracy').textContent = `${accuracy}%`;

    // 2. 學習進度概覽 (Doughnut)
    const totalPossible = globalQuestions.length;
    const attemptedCount = attemptedIds.length;
    
    if (progressChart) progressChart.destroy();
    progressChart = new Chart(document.getElementById('progressChart'), {
        type: 'doughnut',
        data: {
            labels: ['已挑戰', '未挑戰'],
            datasets: [{
                data: [attemptedCount, totalPossible - attemptedCount],
                backgroundColor: ['#7c6dfa', '#23263a'],
                borderWidth: 0
            }]
        },
        options: {
            maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom', labels: { color: '#7a7e9a' } } }
        }
    });

    // 3. 高風險 Top 10 (Horizontal Bar Chart)
    const sortedData = attemptedIds
        .map(id => {
            const s = stats[id];
            const q = globalQuestions.find(i => i.id === id);
            return { id, rate: (s.wrong / s.total * 100), total: s.total, text: q ? q.question : id };
        })
        .sort((a, b) => b.rate - a.rate)
        .slice(0, 10);

    if (riskChart) riskChart.destroy();
    riskChart = new Chart(document.getElementById('riskChart'), {
        type: 'bar',
        data: {
            labels: sortedData.map(d => d.id),
            datasets: [{
                label: '錯誤率 (%)',
                data: sortedData.map(d => d.rate),
                backgroundColor: sortedData.map(d => d.rate > 70 ? '#e05c6e' : '#f59e0b'),
                borderRadius: 5
            }]
        },
        options: {
            indexAxis: 'y',
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { max: 100, ticks: { color: '#7a7e9a' }, grid: { color: '#2d3148' } },
                y: { ticks: { color: '#7a7e9a' }, grid: { display: false } }
            }
        }
    });

    // 4. 完整滾動清單
    const fullList = document.getElementById('full-analysis-list');
    const allData = attemptedIds
        .map(id => {
            const s = stats[id];
            const q = globalQuestions.find(i => i.id === id);
            return { id, rate: (s.wrong / s.total * 100), ...s, text: q ? q.question : id };
        })
        .sort((a, b) => b.rate - a.rate);

    fullList.innerHTML = allData.map(item => `
        <div class="analysis-item">
            <div class="analysis-info">
                <div class="analysis-id">${item.id} <span style="font-weight:normal; color:var(--muted); font-size:0.7rem;">(答錯 ${item.wrong} / 共 ${item.total} 次)</span></div>
                <div class="analysis-text">${item.text}</div>
            </div>
            <div class="analysis-stat">
                <div class="analysis-rate" style="color: ${item.rate > 50 ? 'var(--wrong)' : 'var(--correct)'}">${Math.round(item.rate)}%</div>
            </div>
        </div>
    `).join('');
}

/* AI 詳解助教 (New Feature) */
const aiModal = document.getElementById('ai-modal');
const closeAi = document.getElementById('close-ai');
const closeAiBtn = document.getElementById('close-ai-btn');
const copyAiBtn = document.getElementById('copy-ai-prompt');
const aiPromptText = document.getElementById('ai-prompt-text');

function openAIPrompt(q) {
    if (!q) return;
    const keys = ['A', 'B', 'C', 'D', 'E', 'F'];
    
    let options = q.options;
    let correctIndices = []; // 0-based
    
    if (q.correct !== undefined) {
        correctIndices = q.correct;
    } else if (q.answer !== undefined) {
        if (Array.isArray(q.answer)) {
            correctIndices = q.answer.map(a => typeof a === 'number' ? a - 1 : a);
        } else {
            correctIndices = [q.answer - 1];
        }
    }

    let optionsText = options.map((opt, i) => `${keys[i]}. ${opt}`).join('\n');
    let correctAnsText = correctIndices.map(idx => `${keys[idx]}. ${options[idx]}`).join('、');

    const prompt = `你是一個專業的老師，請幫助學生詳細解釋以下的選擇題。請分析題目中的關鍵資訊，說明為什麼正確答案是對的，以及為什麼其他選項是錯的。請盡量提供深入的解釋，幫助學生理解背後的概念和邏輯。

題目：${q.question}

選項：
${optionsText}

請以繁體中文回答。`;

    aiPromptText.value = prompt;
    aiModal.classList.add('active');
}

// Global helpers for onclick handlers
window.openAIPromptFromResult = (idx) => {
    openAIPrompt(answers[idx]);
};

window.openAIPromptFromBrowser = (id) => {
    const q = globalQuestions.find(x => x.id === id);
    if (q) openAIPrompt(q);
};

closeAi.onclick = () => aiModal.classList.remove('active');
closeAiBtn.onclick = () => aiModal.classList.remove('active');
copyAiBtn.onclick = () => {
    aiPromptText.select();
    aiPromptText.setSelectionRange(0, 99999); // For mobile
    navigator.clipboard.writeText(aiPromptText.value).then(() => {
        const originalText = copyAiBtn.textContent;
        copyAiBtn.textContent = '✅ 已複製！';
        setTimeout(() => copyAiBtn.textContent = originalText, 2000);
    });
};

const topicFilter = document.getElementById('topic-filter');
const diffFilter = document.getElementById('diff-filter');

const onlyRisky = document.getElementById('only-risky');

    initBrowser();

    topicFilter.innerHTML = '<option value="">所有主題</option>' +

// 使用事件委派處理點擊
browserListEl.onclick = (e) => {
    const bookmarkBtn = e.target.closest('.bookmark-btn');
    if (bookmarkBtn) {
        const id = bookmarkBtn.dataset.id;
        toggleBookmark(id);
        return;
    }

    const aiBtn = e.target.closest('.ai-btn');
    if (aiBtn) {
        const id = aiBtn.dataset.id;
        const q = globalQuestions.find(item => item.id === id);
        if (q) openAIPrompt(q);

    }

function renderBrowserList() {
    const stats = getStats();
    const bookmarks = getBookmarks();
    const searchTerm = searchInput.value.toLowerCase();
    const targetTopic = topicFilter.value;
    const targetDiff = diffFilter.value;
    
    const filtered = globalQuestions.filter(q => {
        const s = stats[q.id] || { total: 0, wrong: 0 };
        const rate = s.total > 0 ? (s.wrong / s.total) : 0;
        const isBookmarked = bookmarks.includes(q.id);
        
        if (searchTerm && !q.question.toLowerCase().includes(searchTerm)) return false;
        if (targetTopic && q.topic !== targetTopic) return false;
        if (targetDiff && q.difficulty !== targetDiff) return false;
        if (onlyBookmarked.checked && !isBookmarked) return false;
        if (onlyRisky.checked && rate <= 0.5) return false;
        
        return true;
    });

    if (filtered.length === 0) {
        browserListEl.innerHTML = '<p class="toast">找不到符合條件的題目。</p>';
        return;
    }

    browserListEl.innerHTML = filtered.map(q => {
        const s = stats[q.id] || { total: 0, wrong: 0 };
        const rate = s.total > 0 ? (s.wrong / s.total) : 0;
        const isBookmarked = bookmarks.includes(q.id);
        const correctAns = q.options[q.answer - 1]; // 注意：answer 是 1-based

        return `
            <div class="question-card">
                <div class="q-header">
                    <div class="q-id">${q.id}</div>
                    <div class="q-badges">
                        ${isBookmarked ? '<span class="badge-mini badge-bookmark">⭐ 已收藏</span>' : ''}
                        ${rate > 0.5 ? '<span class="badge-mini badge-risk">⚠️ 易錯題</span>' : ''}
                    </div>
                </div>
                <div class="q-text">${formatQuestionText(q.question)}</div>
                <div class="q-ans">正確答案：${correctAns}</div>
                <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                    <div class="q-meta">
                        <span>🏷️ ${q.topic}</span>
                        <span>📊 ${q.difficulty}</span>
                    </div>
                    <div style="display:flex; gap: 8px;">
                        <button class="ai-btn bookmark-btn" data-id="${q.id}" style="border-color: var(--accent); color: var(--accent);">🤖 AI 詳解</button>
                        <button class="bookmark-btn ${isBookmarked ? 'active' : ''}" data-id="${q.id}">
                            ${isBookmarked ? '★ 取消收藏' : '☆ 加入收藏'}
                        </button>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

/* 初始化：載入 manifest 與所有題目 */
async function init() {
    if (redirectTimer) {
        clearTimeout(redirectTimer);
        redirectTimer = null;
    }
    showScreen('select');
    const listEl = document.getElementById('quiz-list');
    try {
        const res = await fetch(MANIFEST_PATH);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        quizSets = await res.json();
        
        // 預先載入所有題目
        const qRes = await fetch('data/all_questions.json');
        globalQuestions = await qRes.json();
        
        renderQuizList();
        checkProgress(); // 檢查是否有未完成進度
    } catch (e) {
        listEl.innerHTML = `<p class="toast error">⚠ 無法載入資料<br><small>${e.message}</small></p>`;
    }
}

/* 渲染題目集選單 */
function renderQuizList() {
    const listEl   = document.getElementById('quiz-list');
    const startBtn = document.getElementById('start-btn');
    
    const wrongIds = getWrongQuestions();

    // 1. 挑戰區 (不收摺)
    let listHtml = `
        <div class="challenge-section">
            <div class="challenge-title">挑戰</div>
            <div class="quiz-card challenge-card" data-type="comp">
                <div class="name">🔥 全題目綜合測驗</div>
                <div class="meta">從所有章節隨機出題</div>
            </div>
            ${wrongIds.length > 0 ? `
            <div class="quiz-card challenge-card" data-type="wrong" style="margin-top: 8px; border-color: var(--wrong-soft); background: var(--wrong-soft);">
                <div class="name">❌ 錯題強化練習</div>
                <div class="meta">針對你曾答錯的 ${wrongIds.length} 題進行複習</div>
            </div>
            ` : ''}
        </div>
    `;

    // 2. 按章節選 (從 manifest.json 載入)
    quizSets.forEach(subjectData => {
        listHtml += `
            <div class="list-section">
                <div class="list-section-header">${subjectData.subject}</div>
                <div class="list-section-content">
                    ${subjectData.topics.map(t => `
                        <div class="quiz-card topic-card" data-full-topic="${t.full_topic}">
                            <input type="checkbox" class="topic-checkbox" value="${t.full_topic}">
                            <div class="name">${t.title}</div>
                            <div class="meta">共 ${t.count} 題</div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    });

    listEl.innerHTML = listHtml;

    // 收摺功能事件
    listEl.querySelectorAll('.list-section-header').forEach(header => {
        header.addEventListener('click', () => {
            header.parentElement.classList.toggle('active');
        });
    });

    const updateStartBtnState = () => {
        const hasSelectedTopic = listEl.querySelectorAll('.topic-checkbox:checked').length > 0;
        const hasSelectedChallenge = listEl.querySelector('.challenge-card.selected') !== null;
        startBtn.disabled = !(hasSelectedTopic || hasSelectedChallenge);
    };

    // 挑戰卡片事件 (單選)
    listEl.querySelectorAll('.challenge-card').forEach(card => {
        card.addEventListener('click', () => {
            // 清除所有勾選
            listEl.querySelectorAll('.topic-checkbox').forEach(cb => {
                cb.checked = false;
                cb.closest('.quiz-card').classList.remove('selected');
            });
            
            const isAlreadySelected = card.classList.contains('selected');
            listEl.querySelectorAll('.challenge-card').forEach(c => c.classList.remove('selected'));
            
            if (!isAlreadySelected) {
                card.classList.add('selected');
            }
            updateStartBtnState();
        });
    });

    // 章節卡片事件 (多選)
    listEl.querySelectorAll('.topic-card').forEach(card => {
        const cb = card.querySelector('.topic-checkbox');
        card.addEventListener('click', (e) => {
            if (e.target !== cb) {
                cb.checked = !cb.checked;
            }
            card.classList.toggle('selected', cb.checked);
            
            // 如果勾選了章節，取消挑戰卡的選擇
            if (cb.checked) {
                listEl.querySelectorAll('.challenge-card').forEach(c => c.classList.remove('selected'));
            }
            updateStartBtnState();
        });
        cb.addEventListener('change', () => {
            card.classList.toggle('selected', cb.checked);
            if (cb.checked) {
                listEl.querySelectorAll('.challenge-card').forEach(c => c.classList.remove('selected'));
            }
            updateStartBtnState();
        });
    });

    startBtn.onclick = () => {
        const selectedChallenge = listEl.querySelector('.challenge-card.selected');
        const selectedCheckboxes = listEl.querySelectorAll('.topic-checkbox:checked');
        
        let filtered = [];
        if (selectedChallenge) {
            const type = selectedChallenge.dataset.type;
            if (type === 'comp') {
                isComprehensive = true;
                filtered = globalQuestions;
            } else if (type === 'wrong') {
                isComprehensive = false;
                const currentWrongIds = getWrongQuestions();
                filtered = globalQuestions.filter(q => currentWrongIds.includes(q.id));
            }
        } else if (selectedCheckboxes.length > 0) {
            isComprehensive = selectedCheckboxes.length > 1; // 多於一章視為綜合
            const selectedTopics = Array.from(selectedCheckboxes).map(cb => cb.value);
            filtered = globalQuestions.filter(q => selectedTopics.includes(q.topic));
        }
        
        if (filtered.length > 0) {
            processAndStart(filtered);
        }
    };
}

/* 處理題目資料並開始 */
function processAndStart(raw) {
    questions = raw.map(q => {
        const questionText = q.question;
        const options = q.options;
        let ans = q.answer;
        const id = q.id || "";
        const level = q.difficulty || "";
        const topic = q.topic || "";
        
        // 確保答案索引是 0 為基底
        if (typeof ans === 'number') {
            ans = ans - 1;
        } else if (Array.isArray(ans)) {
            ans = ans.map(a => typeof a === 'number' ? a - 1 : a);
        }

        return {
            question: questionText,
            options: options,
            answer: ans,
            id: id,
            level: level,
            topic: topic
        };
    });

    questions = shuffle(questions);
    current = 0;
    // 初始化與題目等長的陣列
    answers = new Array(questions.length).fill(null);
    clearProgress(); // 開始新測驗前清除舊進度
    showScreen('quiz');
    renderQuestion();
}

/* 渲染題目 */
function renderQuestion() {
    const q       = questions[current];
    const total   = questions.length;
    const isMulti = Array.isArray(q.answer);
    selected = new Set();

    document.getElementById('progress-bar').style.width = `${(current / total) * 100}%`;
    
    // 綜合模式不顯示總題數，減輕壓力
    document.getElementById('q-counter').textContent = isComprehensive 
        ? `第 ${current + 1} 題` 
        : `${current + 1} / ${total}`;
    
    const meta = [q.id, q.level].filter(Boolean).join(' | ');
    const typeBadge = document.getElementById('type-badge');
    typeBadge.textContent = meta;
    typeBadge.style.display = meta ? 'inline-block' : 'none';
    
    document.getElementById('topic-badge').textContent  = q.topic || "";
    document.getElementById('question-text').textContent = formatQuestionText(q.question);

    const optEl   = document.getElementById('options');
    const nextBtn = document.getElementById('next-btn');
    const prevBtn = document.getElementById('prev-btn');
    const exitBtn = document.getElementById('exit-btn');
    const expContainer = document.getElementById('explanation-container');
    const keys    = ['A','B','C','D','E','F'];
    
    // 清空詳解區
    expContainer.innerHTML = '';

    // 判斷該題是否已作答
    const isAnswered = answers[current] !== null;
    const answeredData = isAnswered ? answers[current] : null;

    nextBtn.disabled = false;
    exitBtn.disabled = false;
    prevBtn.disabled = current === 0;

    // 更新按鈕文字的輔助函數
    const updateNextBtnUI = () => {
        if (answers[current] !== null) {
            nextBtn.textContent = current === total - 1 ? '完成作答' : '下一題 →';
        } else {
            if (selected.size === 0) {
                nextBtn.textContent = '跳過';
            } else {
                nextBtn.textContent = current === total - 1 ? '完成作答' : '下一題 →';
            }
        }
    };
    updateNextBtnUI();

    optEl.innerHTML = q.options.map((opt, i) => {
        let extraClass = '';
        if (answers[current] !== null) {
            extraClass += ' locked';
            const correct = new Set(answeredData.correct);
            const selectedSet = new Set(answeredData.selected);
            if (correct.has(i)) extraClass += ' correct';
            if (selectedSet.has(i) && !correct.has(i)) extraClass += ' wrong';
            if (selectedSet.has(i) && correct.has(i)) extraClass += ' selected'; 
        }
        return `
            <div class="option${extraClass}" data-i="${i}">
                <span class="option-key">${keys[i]}</span>
                <span class="option-text">${opt}</span>
            </div>
        `;
    }).join('');

    // 如果已作答且錯誤，顯示詳解按鈕
    if (answers[current] !== null && !answeredData.isCorrect) {
        showExplanationButton(q, answeredData, expContainer);
    }
    
    // 自動儲存進度 (狀態改變即儲存)
    saveProgress();

    exitBtn.onclick = () => {
        if (confirm('確定要退出並查看目前的結果嗎？')) {
            showResult();
        }
    };

    prevBtn.onclick = () => {
        if (current > 0) {
            current--;
            renderQuestion();
        }
    };

    optEl.querySelectorAll('.option').forEach(el => {
        el.addEventListener('click', () => {
            if (el.classList.contains('locked') || answers[current] !== null) return;
            const idx = parseInt(el.dataset.i);
            if (isMulti) {
                selected.has(idx) ? selected.delete(idx) : selected.add(idx);
                el.classList.toggle('selected', selected.has(idx));
            } else {
                // 若已選取該選項，再次點擊視為確認答案並跳下一題
                if (selected.has(idx)) {
                    nextBtn.onclick();
                    return;
                }
                optEl.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                selected = new Set([idx]);
                el.classList.add('selected');
            }
            updateNextBtnUI();
            saveProgress(); // 點擊選項即儲存
        });
    });

    nextBtn.onclick = () => {
        if (answers[current] !== null) {
            current++;
            if (current < questions.length) renderQuestion();
            else showResult();
        } else {
            if (selected.size === 0) {
                // 跳過：不存入 answers，直接下一題
                current++;
                if (current < questions.length) renderQuestion();
                else showResult();
            } else {
                submitAnswer(q, isMulti);
            }
        }
    };
}

/* 顯示詳解按鈕 */
function showExplanationButton(q, answeredData, container) {
    const btnRow = document.createElement('div');
    btnRow.style.display = 'flex';
    btnRow.style.gap = '10px';
    btnRow.style.marginTop = '10px';

    const aiBtn = document.createElement('button');
    aiBtn.className = 'btn btn-ghost';
    aiBtn.style.flex = '1';
    aiBtn.style.borderColor = 'var(--wrong)';
    aiBtn.innerHTML = '🤖 AI 詳解';

    aiBtn.onclick = () => {
        openAIPrompt(q);
    };

    btnRow.appendChild(aiBtn);
    container.appendChild(btnRow);
}

/* 提交答案 */
function submitAnswer(q, isMulti) {
    const nextBtn = document.getElementById('next-btn');
    const exitBtn = document.getElementById('exit-btn');
    const expContainer = document.getElementById('explanation-container');
    
    nextBtn.disabled = true;
    exitBtn.disabled = true;

    const optEls = document.querySelectorAll('.option');
    const correct = isMulti ? new Set(q.answer) : new Set([q.answer]);

    optEls.forEach(el => {
        el.classList.add('locked');
        const idx = parseInt(el.dataset.i);
        if (correct.has(idx)) el.classList.add('correct');
        if (selected.has(idx) && !correct.has(idx)) el.classList.add('wrong');
    });

    const isCorrect = isMulti
        ? [...selected].sort().toString() === [...correct].sort().toString()
        : selected.has([...correct][0]);

    // 更新統計與錯題標記
    updateStats(q.id, isCorrect);
    if (isCorrect) {
        removeWrongQuestion(q.id);
    } else {
        saveWrongQuestion(q.id);
        
        // 播放答錯音效
        if (audioEnabled) {
            const audio = new Audio('data/fah.mp3');
            audio.play().catch(e => console.log('Audio playback failed:', e));
        }

        // 動態顯示詳解按鈕
        const answeredData = { selected: [...selected], isCorrect: false };
        showExplanationButton(q, answeredData, expContainer);
    }

    // 存入陣列的指定位置
    answers[current] = {
        question: q.question,
        options:  q.options,
        selected: [...selected],
        correct:  [...correct],
        topic:    q.topic,
        isCorrect,
        originalIndex: current,
    };
    
    saveProgress(); // 提交後儲存

    if (isCorrect) {
        setTimeout(() => {
            current++;
            if (current < questions.length) renderQuestion();
            else showResult();
        }, 900);
    } else {
        // 答錯時，不自動跳轉，但要讓使用者可以按「下一題」
        nextBtn.disabled = false;
        exitBtn.disabled = false;
        updateNextBtnUI(); // 更新按鈕文字為「下一題」
    }
}

/* 結果畫面 */
function showResult() {
    showScreen('result');
    const keys    = ['A','B','C','D','E','F'];
    const totalQuestions = questions.length;
    // 過濾掉 null 的項目來統計
    const validAnswers = answers.filter(a => a !== null);
    const answeredCount = validAnswers.length;
    const correctCount = validAnswers.filter(a => a.isCorrect).length;

    document.getElementById('score-number').textContent = `${correctCount} / ${answeredCount}`;

    // 處理結果訊息
    const msgEl = document.getElementById('result-message');
    const cancelBtn = document.getElementById('cancel-redirect-btn');
    msgEl.textContent = '';
    cancelBtn.style.display = 'none';
    if (redirectTimer) {
        clearTimeout(redirectTimer);
        redirectTimer = null;
    }

    if (answeredCount === 0) {
        msgEl.textContent = '後悔了嗎？';
    } else {
        const accuracy = correctCount / answeredCount;
        if (accuracy < 0.5) {
            msgEl.textContent = '同學，錯這麼多還是去當兵吧';
            cancelBtn.style.display = 'inline-block';
            let secondsLeft = 5;
            cancelBtn.textContent = `我不要當兵 (${secondsLeft}s)`;
            
            const countdown = () => {
                secondsLeft--;
                if (secondsLeft > 0) {
                    cancelBtn.textContent = `我不要當兵 (${secondsLeft}s)`;
                    redirectTimer = setTimeout(countdown, 1000);
                } else {
                    window.location.href = "https://www.mnd.gov.tw/";
                }
            };
            redirectTimer = setTimeout(countdown, 1000);
            
            cancelBtn.onclick = () => {
                clearTimeout(redirectTimer);
                redirectTimer = null;
                cancelBtn.style.display = 'none';
                msgEl.textContent = '你知道刷題之前要先讀嗎？';
            };
        }
    }

    // 弱點分析
    const stats = {};
    validAnswers.forEach(a => {
        if (!a.topic) return;
        if (!stats[a.topic]) stats[a.topic] = { total: 0, ok: 0 };
        stats[a.topic].total++;
        if (a.isCorrect) stats[a.topic].ok++;
    });

    const topicList = Object.keys(stats);
    if (topicList.length > 0) {
        document.getElementById('weakness-analysis').style.display = 'block';
        document.getElementById('weakness-list').innerHTML = topicList.map(name => {
            const s = stats[name];
            const rate = Math.round((s.ok / s.total) * 100);
            return `
                <div class="weakness-item">
                    <div class="weakness-name">${name}</div>
                    <div class="weakness-bar-bg"><div class="weakness-bar-fg" style="width:${rate}%"></div></div>
                    <div class="weakness-score">${rate}%</div>
                </div>
            `;
        }).join('');
    } else {
        document.getElementById('weakness-analysis').style.display = 'none';
    }

    const wrongAnswers = validAnswers.filter(a => !a.isCorrect);
    const correctAnswers = validAnswers.filter(a => a.isCorrect);

    const renderItem = (a) => `
        <div class="result-item ${a.isCorrect ? 'ok' : 'fail'}">
            <div class="ri-q">
                <span>第 ${a.originalIndex + 1} 題</span>
                <span class="ri-topic">${a.topic || ''}</span>
            </div>
            <div>${a.question}</div>
            <div class="ri-status" style="display: flex; justify-content: space-between; align-items: center; gap: 10px;">
                <span>
                    ${a.isCorrect
                        ? '✓ 答對'
                        : `✗ 答錯 ── 正確：${a.correct.map(c => keys[c]).join('、')}　你選了：${a.selected.map(c => keys[c]).join('、') || '（未作答）'}`
                    }
                </span>
                ${!a.isCorrect ? `<button class="btn btn-ghost" style="padding: 4px 10px; font-size: 0.75rem; border-color: var(--wrong);" onclick="openAIPromptFromResult(${a.originalIndex})">🤖 AI 詳解</button>` : ''}
            </div>
        </div>
    `;

    let resultHtml = wrongAnswers.map(renderItem).join('');

    if (correctAnswers.length > 0) {
        resultHtml += `
            <div class="correct-answers-section" id="correct-answers-section">
                <div class="correct-answers-header" id="correct-answers-header">
                    <span>顯示答對題目 (${correctAnswers.length})</span>
                </div>
                <div class="correct-answers-content">
                    ${correctAnswers.map(renderItem).join('')}
                </div>
            </div>
        `;
    }

    if (answeredCount < totalQuestions) {
        resultHtml += `<p class="toast">（提前退出，未完成其餘 ${totalQuestions - answeredCount} 題）</p>`;
    }

    const resultListEl = document.getElementById('result-list');
    resultListEl.innerHTML = resultHtml;

    // 绑定收摺事件
    const correctHeader = document.getElementById('correct-answers-header');
    if (correctHeader) {
        correctHeader.onclick = () => {
            document.getElementById('correct-answers-section').classList.toggle('active');
        };
    }

    document.getElementById('retry-btn').onclick = () => {
        if (redirectTimer) {
            clearTimeout(redirectTimer);
            redirectTimer = null;
        }
        questions = shuffle(questions);
        current = 0; answers = new Array(questions.length).fill(null);
        showScreen('quiz');
        renderQuestion();
    };
    document.getElementById('back-btn').onclick = init;
}

/* 工具：隨機排序 */
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

init();
</script>
