<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ✏️ 改這裡換掉標籤頁標題 -->
    <title>Quiz</title>
    <style>
        :root {
            /* Default Dark Theme */
            --bg:           #0f1117;
            --surface:      #1a1d27;
            --surface2:     #23263a;
            --border:       #2d3148;
            --accent:       #7c6dfa;
            --accent-soft:  rgba(124,109,250,.15);
            --text:         #e8eaf0;
            --muted:        #7a7e9a;
            --correct:      #4caf87;
            --correct-soft: rgba(76,175,135,.15);
            --wrong:        #e05c6e;
            --wrong-soft:   rgba(224,92,110,.15);
            --radius:       14px;
            --transition:   .2s ease;
            --theme-desc-color: #ffffff;
        }

        [data-theme="light"] {
            --bg:           #f4f5f7;
            --surface:      #ffffff;
            --surface2:     #eef0f5;
            --border:       #d1d5db;
            --accent:       #5850ec;
            --accent-soft:  rgba(88,80,236,.1);
            --text:         #1f2937;
            --muted:        #6b7280;
            --correct:      #059669;
            --correct-soft: rgba(5,150,105,.1);
            --wrong:        #dc2626;
            --wrong-soft:   rgba(220,38,38,.1);
            --theme-desc-color: #000000;
        }

        [data-theme="ocean"] {
            --bg:           #0a192f;
            --surface:      #112240;
            --surface2:     #1d2d50;
            --border:       #233554;
            --accent:       #64ffda;
            --accent-soft:  rgba(100,255,218,.1);
            --text:         #ccd6f6;
            --muted:        #8892b0;
            --correct:      #10b981;
            --correct-soft: rgba(16,185,129,.1);
            --wrong:        #f43f5e;
            --wrong-soft:   rgba(244,63,94,.1);
            --theme-desc-color: #64ffda;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            transition: background var(--transition), color var(--transition);
        }

        /* Top Bar */
        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            transition: transform 0.3s ease, background var(--transition);
            display: flex;
            flex-direction: column;
        }
        #top-bar.collapsed {
            transform: translateY(-100%);
        }
        .top-bar-content {
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 680px;
            margin: 0 auto;
            width: 100%;
        }
        .settings-dropdown {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease, background var(--transition);
            background: var(--surface);
        }
        .settings-open .settings-dropdown {
            max-height: 100vh;
            overflow-y: auto;
            border-top: 1px solid var(--border);
        }
        .settings-content {
            padding: 32px 24px;
            max-width: 680px;
            margin: 0 auto;
            width: 100%;
        }
        .top-bar-toggle {
            position: absolute;
            bottom: -30px;
            right: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: none;
            color: var(--muted);
            padding: 4px 12px;
            border-radius: 0 0 8px 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: color var(--transition), background var(--transition);
        }
        .top-bar-toggle:hover { color: var(--text); }
        .top-bar-links { display: flex; gap: 20px; align-items: center; }
        .top-bar-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .top-bar-link:hover { color: var(--accent); }
        
        .settings-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .settings-btn:hover { color: var(--text); }

        #app { width: 100%; max-width: 680px; margin-top: 40px; }

        .screen { display: none; }
        .screen.active { display: block; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            transition: background var(--transition), border var(--transition);
        }

        h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
        h2 { font-size: 1.25rem; font-weight: 600; line-height: 1.5; margin-bottom: 20px; white-space: pre-wrap; }
        p  { color: var(--muted); font-size: .95rem; line-height: 1.6; }

        #select-screen .subtitle { margin-bottom: 28px; margin-top: 6px; }

        /* Settings Screen Styles */
        .settings-group { margin-bottom: 24px; }
        .settings-group-title { 
            font-size: 0.85rem; 
            color: var(--accent); 
            font-weight: 700; 
            margin-bottom: 12px; 
            text-transform: uppercase;
        }
        .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
        .theme-option {
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all var(--transition);
        }
        .theme-option:hover { border-color: var(--accent); }
        .theme-option.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
        #theme-description {
            color: var(--theme-desc-color);
            font-weight: 500;
            font-size: 0.95rem;
            transition: color var(--transition);
        }

        .quiz-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
        .list-section { 
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 8px;
        }
        .list-section-header { 
            background: var(--surface2);
            padding: 14px 20px;
            font-size: 0.9rem; 
            color: var(--text); 
            font-weight: 700; 
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background var(--transition);
        }
        .list-section-header:hover { background: var(--border); }
        .list-section-header::after {
            content: '▼';
            font-size: 0.7rem;
            color: var(--muted);
            transition: transform 0.3s;
        }
        .list-section.active .list-section-header::after { transform: rotate(180deg); }
        
        .list-section-content { 
            display: none; 
            padding: 10px;
            flex-direction: column;
            gap: 8px;
            background: rgba(0,0,0,0.1);
        }
        .list-section.active .list-section-content { display: flex; }

        .quiz-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all var(--transition);
            user-select: none;
        }
        .quiz-card:hover { border-color: var(--accent); transform: translateX(4px); }
        .quiz-card.selected { border-color: var(--accent); background: var(--accent-soft); }
        .quiz-card .name { font-weight: 600; font-size: 0.95rem; }
        .quiz-card .meta { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

        /* 挑戰區塊不需要收摺，維持原樣 */
        .challenge-section { margin-bottom: 16px; }
        .challenge-title { 
            font-size: 0.85rem; 
            color: var(--accent); 
            font-weight: 700; 
            margin-bottom: 8px;
            padding-left: 4px;
            text-transform: uppercase;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity var(--transition), transform var(--transition);
        }
        .btn:active { transform: scale(.97); }
        .btn-primary { background: var(--accent); color: #fff; width: 100%; }
        .btn-primary:hover { opacity: .88; }
        .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
        .btn-ghost {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

        .quiz-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 12px;
        }

        .progress-wrap {
            flex: 1;
            height: 6px;
            background: var(--surface2);
            border-radius: 99px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 99px;
            transition: width .4s ease;
        }

        .q-counter { font-size: .82rem; color: var(--muted); white-space: nowrap; }

        .type-badge {
            font-size: .72rem;
            padding: 3px 10px;
            border-radius: 99px;
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 16px;
            display: inline-block;
        }
        .topic-badge {
            font-size: .72rem;
            padding: 3px 10px;
            border-radius: 99px;
            background: var(--surface2);
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 16px;
            margin-left: 8px;
            display: inline-block;
        }

        .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

        .option {
            background: var(--surface2);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            cursor: pointer;
            transition: border-color var(--transition), background var(--transition);
            display: flex;
            align-items: center;
            gap: 14px;
            user-select: none;
        }
        .option:hover:not(.locked) { border-color: var(--accent); }
        .option.selected { border-color: var(--accent); background: var(--accent-soft); }
        .option.correct  { border-color: var(--correct); background: var(--correct-soft); }
        .option.wrong    { border-color: var(--wrong);   background: var(--wrong-soft); }

        .option-key {
            width: 28px; height: 28px;
            border-radius: 7px;
            background: var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: .78rem; font-weight: 700;
            flex-shrink: 0;
            transition: background var(--transition), color var(--transition);
        }
        .option.selected .option-key { background: var(--accent); color: #fff; }
        .option.correct  .option-key { background: var(--correct); color: #fff; }
        .option.wrong    .option-key { background: var(--wrong);   color: #fff; }
        .option-text { font-size: .95rem; line-height: 1.5; }

        .score-ring {
            display: flex; flex-direction: column; align-items: center;
            margin: 28px 0 32px; gap: 6px;
        }
        .score-number { font-size: 3.5rem; font-weight: 800; line-height: 1; }
        .score-label  { color: var(--muted); font-size: .9rem; }

        #result-message {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--wrong);
        }
        #redirect-control {
            text-align: center;
            margin-bottom: 24px;
        }
        #cancel-redirect-btn {
            background: var(--wrong);
            color: white;
            padding: 10px 20px;
            border-radius: var(--radius);
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: none;
        }

        /* 弱點分析 */
        .weakness-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 28px;
        }
        .weakness-title { font-weight: 700; font-size: 1rem; margin-bottom: 12px; color: var(--accent); }
        .weakness-item {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; font-size: .85rem;
        }
        .weakness-bar-bg { flex: 1; height: 4px; background: var(--border); margin: 0 12px; border-radius: 2px; position: relative; }
        .weakness-bar-fg { height: 100%; background: var(--accent); border-radius: 2px; }
        .weakness-name { width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .weakness-score { width: 40px; text-align: right; font-weight: 600; }

        .result-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
        .result-item {
            background: var(--surface2);
            border-radius: 10px;
            padding: 14px 18px;
            border-left: 4px solid var(--border);
            font-size: .9rem;
        }
        .result-item.ok   { border-color: var(--correct); }
        .result-item.fail { border-color: var(--wrong); }
        .result-item .ri-q { color: var(--muted); font-size: .82rem; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .result-item .ri-topic { font-size: .75rem; color: var(--accent); opacity: 0.8; }
        .result-item .ri-status { font-weight: 600; font-size: .82rem; margin-top: 6px; }
        .result-item.ok   .ri-status { color: var(--correct); }
        .result-item.fail .ri-status { color: var(--wrong); }

        /* 正確題目收摺 */
        .correct-answers-section {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-top: 10px;
        }
        .correct-answers-header {
            background: var(--surface2);
            padding: 14px 20px;
            font-size: 0.9rem;
            color: var(--correct);
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .correct-answers-header::after {
            content: '▼';
            font-size: 0.7rem;
            color: var(--muted);
            transition: transform 0.3s;
        }
        .correct-answers-section.active .correct-answers-header::after { transform: rotate(180deg); }
        .correct-answers-content {
            display: none;
            padding: 10px;
            flex-direction: column;
            gap: 10px;
            background: rgba(0,0,0,0.1);
        }
        .correct-answers-section.active .correct-answers-content { display: flex; }

        /* 調整按鈕列，讓退出按鈕較短 */
        .quiz-actions { display: flex; gap: 10px; }
        .quiz-actions #exit-btn { 
            flex: 0 0 80px; 
            padding: 12px 0; 
            font-size: 0.9rem; 
            color: var(--wrong);
            border: 1px solid var(--wrong);
        }
        .quiz-actions #exit-btn:hover {
            background: var(--wrong-soft);
            color: var(--wrong);
            border-color: var(--wrong);
        }
        .quiz-actions #next-btn { flex: 1; }

        .btn-row { display: flex; gap: 10px; }
        .btn-row .btn { flex: 1; }

        .toast { text-align: center; padding: 20px; color: var(--muted); }
        .toast.error { color: var(--wrong); }
    </style>
</head>
<body>

<!-- Top Bar -->
<div id="top-bar">
    <div class="top-bar-content">
        <div class="top-bar-links">
            <a href="https://github.com/Purp1eSheep/iPAS_AI_ElementaryTopicsWeb" target="_blank" class="top-bar-link">

                GitHub Repo
            </a>
        </div>
        <div class="top-bar-links">
            <button id="settings-btn" class="settings-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                設定
            </button>
        </div>
    </div>

    <!-- 設定展開區域 -->
    <div id="settings-dropdown" class="settings-dropdown">
        <div class="settings-content">
            <h1 style="margin-top: 10px;">⚙️ 設定</h1>
            <div class="settings-group" style="margin-top: 20px;">
                <div class="settings-group-title">主題選擇</div>
                <div class="theme-grid">
                    <div class="theme-option" data-theme="dark">深色</div>
                    <div class="theme-option" data-theme="light">淺色</div>
                    <div class="theme-option" data-theme="ocean">深海</div>
                </div>
                <p id="theme-description" style="margin-top: 12px; font-weight: 500; font-size: 0.95rem; transition: color var(--transition);"></p>
            </div>
            <div class="settings-group">
                <div class="settings-group-title">資料管理</div>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button id="clear-history-btn" class="btn btn-ghost" style="width: 100%; color: var(--wrong); border: 2px solid var(--wrong);">❌ 清除錯題紀錄</button>
                    <button id="clear-all-btn" class="btn btn-ghost" style="width: 100%; color: var(--wrong); border: 2px solid var(--wrong);">🔥 清除所有資料</button>
                </div>
                <p style="margin-top: 12px; font-size: 0.8rem; text-align: center; color: var(--muted);">「清除所有資料」將包含主題設定與所有紀錄</p>
            </div>
            <div class="btn-row" style="margin-top: 32px;">
                <button id="settings-back-btn" class="btn btn-primary">返回</button>
            </div>
        </div>
    </div>

    <button id="top-bar-toggle" class="top-bar-toggle">▲</button>
</div>

<div id="app">

    <!-- ① 選擇題目集 -->
    <div id="select-screen" class="screen card active">
        <h1>📝 Quiz</h1>
        <p class="subtitle">選擇題目集，然後開始作答</p>
        <div id="quiz-list" class="quiz-list">
            <p class="toast">載入中…</p>
        </div>
        <button id="start-btn" class="btn btn-primary" disabled>開始作答 →</button>
    </div>

    <!-- ② 作答中 -->
    <div id="quiz-screen" class="screen">
        <div class="card">
            <div class="quiz-header">
                <div class="progress-wrap">
                    <div id="progress-bar" class="progress-bar" style="width:0%"></div>
                </div>
                <span id="q-counter" class="q-counter">0 / 0</span>
            </div>
            <div style="display: flex; align-items: baseline;">
                <span id="type-badge" class="type-badge"></span>
                <span id="topic-badge" class="topic-badge"></span>
            </div>
            <h2 id="question-text"></h2>
            <div id="options" class="options"></div>
            <div class="quiz-actions">
                <button id="exit-btn" class="btn btn-ghost">退出</button>
                <div style="display: flex; gap: 10px; flex: 1;">
                    <button id="prev-btn" class="btn btn-ghost" style="flex: 1;">← 上一題</button>
                    <button id="next-btn" class="btn btn-primary" style="flex: 1;" disabled>下一題 →</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ③ 結果 -->
    <div id="result-screen" class="screen card">
        <h1>結果</h1>
        <div class="score-ring">
            <div id="score-number" class="score-number">—</div>
            <div class="score-label">答對題數</div>
        </div>
        <div id="result-message"></div>
        <div id="redirect-control">
            <button id="cancel-redirect-btn">我不要當兵</button>
        </div>
        <div id="weakness-analysis" class="weakness-card" style="display:none">
            <div class="weakness-title">📊 弱點分析</div>
            <div id="weakness-list"></div>
        </div>
        <div id="result-list" class="result-list"></div>
        <div class="btn-row">
            <button id="retry-btn" class="btn btn-ghost">重新作答</button>
            <button id="back-btn"  class="btn btn-primary">換題目集</button>
        </div>
    </div>

</div>
<script>
/* =============================================================
      設定
      MANIFEST_PATH: 題目清單的路徑，通常不需要改
      ============================================================= */
const MANIFEST_PATH = 'data/manifest.json';

/* 狀態 */
let quizSets  = [];
let globalQuestions = []; // 快取所有題目
let questions = [];
let current   = 0;
let answers   = [];
let selected  = new Set();
let isComprehensive = false;
let redirectTimer = null;
let previousScreen = 'select';
let isSettingsOpen = false;

/* 錯題管理 */
const WRONG_QS_KEY = 'quiz_wrong_questions';
function getWrongQuestions() {
    return JSON.parse(localStorage.getItem(WRONG_QS_KEY) || '[]');
}
function saveWrongQuestion(id) {
    let wrong = getWrongQuestions();
    if (!wrong.includes(id)) {
        wrong.push(id);
        localStorage.setItem(WRONG_QS_KEY, JSON.stringify(wrong));
    }
}
function removeWrongQuestion(id) {
    let wrong = getWrongQuestions();
    const index = wrong.indexOf(id);
    if (index > -1) {
        wrong.splice(index, 1);
        localStorage.setItem(WRONG_QS_KEY, JSON.stringify(wrong));
    }
}
function clearWrongQuestions() {
    localStorage.removeItem(WRONG_QS_KEY);
    alert('錯題紀錄已清除');
    location.reload();
}
function clearAllData() {
    localStorage.clear();
    alert('所有資料已清除');
    location.reload();
}

/* 主題管理 */
const THEME_KEY = 'quiz_theme';
function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem(THEME_KEY, theme);
    updateThemeUI(theme);
}
function updateThemeUI(theme) {
    document.querySelectorAll('.theme-option').forEach(opt => {
        opt.classList.toggle('active', opt.dataset.theme === theme);
    });
    
    const themeDesc = document.getElementById('theme-description');
    if (theme === 'dark') {
        themeDesc.textContent = '探索深邃的暗夜脈動，專注於智慧的閃光。';
    } else if (theme === 'ocean') {
        themeDesc.textContent = '徜徉在無垠的湛藍深處，探索知識的邊際。';
    } else if (theme === 'light') {
        themeDesc.textContent = '你有病';
    }
}
// 初始化主題
const savedTheme = localStorage.getItem(THEME_KEY) || 'dark';
setTheme(savedTheme);

/* Top Bar Toggle */
const topBar = document.getElementById('top-bar');
const topBarToggle = document.getElementById('top-bar-toggle');
topBarToggle.onclick = () => {
    topBar.classList.toggle('collapsed');
    topBarToggle.textContent = topBar.classList.contains('collapsed') ? '▼' : '▲';
};

/* Settings Logic */
const settingsBtn = document.getElementById('settings-btn');
const settingsDropdown = document.getElementById('settings-dropdown');

function toggleSettings(forceClose = false) {
    if (forceClose) {
        isSettingsOpen = false;
    } else {
        isSettingsOpen = !isSettingsOpen;
    }
    
    topBar.classList.toggle('settings-open', isSettingsOpen);
    
    // 如果開啟設定，確保 top bar 不是收起狀態
    if (isSettingsOpen) {
        topBar.classList.remove('collapsed');
        topBarToggle.textContent = '▲';
    }
}

settingsBtn.onclick = () => toggleSettings();
document.getElementById('settings-back-btn').onclick = () => toggleSettings(true);

/* 畫面切換 */
const screens = {
    select: document.getElementById('select-screen'),
    quiz:   document.getElementById('quiz-screen'),
    result: document.getElementById('result-screen'),
};
function showScreen(name) {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
    // 如果開啟了設定，切換畫面時自動關閉
    toggleSettings(true);
}

document.querySelectorAll('.theme-option').forEach(opt => {
    opt.onclick = () => setTheme(opt.dataset.theme);
});

document.getElementById('clear-history-btn').onclick = () => {
    if (confirm('是否要清除所有錯題紀錄？')) {
        clearWrongQuestions();
    }
};

document.getElementById('clear-all-btn').onclick = () => {
    if (confirm('確定要清除「所有」應用程式資料嗎？這將包含您的主題設定與所有練習紀錄。')) {
        clearAllData();
    }
};

/* 初始化：載入 manifest 與所有題目 */
async function init() {
    if (redirectTimer) {
        clearTimeout(redirectTimer);
        redirectTimer = null;
    }
    showScreen('select');
    const listEl = document.getElementById('quiz-list');
    try {
        const res = await fetch(MANIFEST_PATH);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        quizSets = await res.json();
        
        // 預先載入所有題目
        const qRes = await fetch('data/all_questions.json');
        globalQuestions = await qRes.json();
        
        renderQuizList();
    } catch (e) {
        listEl.innerHTML = `<p class="toast error">⚠ 無法載入資料<br><small>${e.message}</small></p>`;
    }
}

/* 渲染題目集選單 */
function renderQuizList() {
    const listEl   = document.getElementById('quiz-list');
    const startBtn = document.getElementById('start-btn');
    let chosen = null;

    const wrongIds = getWrongQuestions();

    // 1. 挑戰區 (不收摺)
    let listHtml = `
        <div class="challenge-section">
            <div class="challenge-title">挑戰</div>
            <div class="quiz-card" data-type="comp">
                <div class="name">🔥 全題目綜合測驗</div>
                <div class="meta">從所有章節隨機出題，無壓力模式</div>
            </div>
            ${wrongIds.length > 0 ? `
            <div class="quiz-card" data-type="wrong" style="margin-top: 8px; border-color: var(--wrong-soft); background: var(--wrong-soft);">
                <div class="name">❌ 錯題強化練習</div>
                <div class="meta">針對你曾答錯的 ${wrongIds.length} 題進行複習</div>
            </div>
            ` : ''}
        </div>
    `;

    // 2. 按章節選 (收摺)
    listHtml += `
        <div class="list-section">
            <div class="list-section-header">按章節練習</div>
            <div class="list-section-content">
                ${quizSets.map((q, i) => `
                    <div class="quiz-card" data-type="topic" data-value="${q.title}">
                        <div class="name">${q.title}</div>
                        <div class="meta">${q.description ?? ''}</div>
                    </div>
                `).join('')}
            </div>
        </div>
    `;

    // 3. 按難易度選 (收摺)
    const difficulties = ["易", "中", "難"];
    listHtml += `
        <div class="list-section">
            <div class="list-section-header">按難易度篩選</div>
            <div class="list-section-content">
                ${difficulties.map(d => {
                    const count = globalQuestions.filter(q => q.difficulty === d).length;
                    if (count === 0) return '';
                    return `
                        <div class="quiz-card" data-type="level" data-value="${d}">
                            <div class="name">${d}</div>
                            <div class="meta">共 ${count} 題</div>
                        </div>
                    `;
                }).join('')}
            </div>
        </div>
    `;

    listEl.innerHTML = listHtml;

    // 收摺功能事件
    listEl.querySelectorAll('.list-section-header').forEach(header => {
        header.addEventListener('click', () => {
            header.parentElement.classList.toggle('active');
        });
    });

    // 選擇題庫事件
    listEl.querySelectorAll('.quiz-card').forEach(card => {
        card.addEventListener('click', (e) => {
            e.stopPropagation(); // 防止觸發收摺
            listEl.querySelectorAll('.quiz-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            chosen = { 
                type: card.dataset.type, 
                value: card.dataset.value 
            };
            startBtn.disabled = false;
        });
    });

    startBtn.onclick = () => {
        if (!chosen) return;
        
        let filtered = [];
        if (chosen.type === 'comp') {
            isComprehensive = true;
            filtered = globalQuestions;
        } else if (chosen.type === 'topic') {
            isComprehensive = false;
            filtered = globalQuestions.filter(q => q.topic === chosen.value);
        } else if (chosen.type === 'level') {
            isComprehensive = false;
            filtered = globalQuestions.filter(q => q.difficulty === chosen.value);
        } else if (chosen.type === 'wrong') {
            isComprehensive = false;
            const currentWrongIds = getWrongQuestions();
            filtered = globalQuestions.filter(q => currentWrongIds.includes(q.id));
        }
        
        processAndStart(filtered);
    };
}

/* 處理題目資料並開始 */
function processAndStart(raw) {
    questions = raw.map(q => {
        const questionText = q.question;
        const options = q.options;
        let ans = q.answer;
        const id = q.id || "";
        const level = q.difficulty || "";
        const topic = q.topic || "";
        
        // 確保答案索引是 0 為基底
        if (typeof ans === 'number') {
            ans = ans - 1;
        } else if (Array.isArray(ans)) {
            ans = ans.map(a => typeof a === 'number' ? a - 1 : a);
        }

        return {
            question: questionText,
            options: options,
            answer: ans,
            id: id,
            level: level,
            topic: topic
        };
    });

    questions = shuffle(questions);
    current = 0;
    // 修改：初始化與題目等長的陣列
    answers = new Array(questions.length).fill(null);
    showScreen('quiz');
    renderQuestion();
}

/* 渲染題目 */
function renderQuestion() {
    const q       = questions[current];
    const total   = questions.length;
    const isMulti = Array.isArray(q.answer);
    selected = new Set();

    document.getElementById('progress-bar').style.width = `${(current / total) * 100}%`;
    
    // 綜合模式不顯示總題數，減輕壓力
    document.getElementById('q-counter').textContent = isComprehensive 
        ? `第 ${current + 1} 題` 
        : `${current + 1} / ${total}`;
    
    const meta = [q.id, q.level].filter(Boolean).join(' | ');
    const typeBadge = document.getElementById('type-badge');
    typeBadge.textContent = meta;
    typeBadge.style.display = meta ? 'inline-block' : 'none';
    
    document.getElementById('topic-badge').textContent  = q.topic || "";
    document.getElementById('question-text').textContent = q.question;

    const optEl   = document.getElementById('options');
    const nextBtn = document.getElementById('next-btn');
    const prevBtn = document.getElementById('prev-btn');
    const exitBtn = document.getElementById('exit-btn');
    const keys    = ['A','B','C','D','E','F'];
    
    // 修改：判斷該題是否已作答
    const isAnswered = answers[current] !== null;
    const answeredData = isAnswered ? answers[current] : null;

    nextBtn.disabled = false;
    exitBtn.disabled = false;
    prevBtn.disabled = current === 0;

    // 更新按鈕文字的輔助函數
    const updateNextBtnUI = () => {
        if (isAnswered) {
            nextBtn.textContent = current === total - 1 ? '完成作答' : '下一題 →';
        } else {
            if (selected.size === 0) {
                nextBtn.textContent = '跳過';
            } else {
                nextBtn.textContent = current === total - 1 ? '完成作答' : '下一題 →';
            }
        }
    };
    updateNextBtnUI();

    optEl.innerHTML = q.options.map((opt, i) => {
        let extraClass = '';
        if (isAnswered) {
            extraClass += ' locked';
            const correct = new Set(answeredData.correct);
            const selectedSet = new Set(answeredData.selected);
            if (correct.has(i)) extraClass += ' correct';
            if (selectedSet.has(i) && !correct.has(i)) extraClass += ' wrong';
            if (selectedSet.has(i) && correct.has(i)) extraClass += ' selected'; 
        }
        return `
            <div class="option${extraClass}" data-i="${i}">
                <span class="option-key">${keys[i]}</span>
                <span class="option-text">${opt}</span>
            </div>
        `;
    }).join('');

    exitBtn.onclick = () => {
        if (confirm('確定要退出並查看目前的結果嗎？')) {
            showResult();
        }
    };

    prevBtn.onclick = () => {
        if (current > 0) {
            current--;
            renderQuestion();
        }
    };

    optEl.querySelectorAll('.option').forEach(el => {
        el.addEventListener('click', () => {
            if (el.classList.contains('locked') || isAnswered) return;
            const idx = parseInt(el.dataset.i);
            if (isMulti) {
                selected.has(idx) ? selected.delete(idx) : selected.add(idx);
                el.classList.toggle('selected', selected.has(idx));
            } else {
                optEl.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                selected = new Set([idx]);
                el.classList.add('selected');
            }
            updateNextBtnUI();
        });
    });

    nextBtn.onclick = () => {
        if (isAnswered) {
            current++;
            if (current < questions.length) renderQuestion();
            else showResult();
        } else {
            if (selected.size === 0) {
                // 跳過：不存入 answers，直接下一題
                current++;
                if (current < questions.length) renderQuestion();
                else showResult();
            } else {
                submitAnswer(q, isMulti);
            }
        }
    };
}

/* 提交答案 */
function submitAnswer(q, isMulti) {
    const nextBtn = document.getElementById('next-btn');
    const exitBtn = document.getElementById('exit-btn');
    nextBtn.disabled = true;
    exitBtn.disabled = true;

    const optEls = document.querySelectorAll('.option');
    const correct = isMulti ? new Set(q.answer) : new Set([q.answer]);

    optEls.forEach(el => {
        el.classList.add('locked');
        const idx = parseInt(el.dataset.i);
        if (correct.has(idx)) el.classList.add('correct');
        if (selected.has(idx) && !correct.has(idx)) el.classList.add('wrong');
    });

    const isCorrect = isMulti
        ? [...selected].sort().toString() === [...correct].sort().toString()
        : selected.has([...correct][0]);

    if (isCorrect) {
        removeWrongQuestion(q.id);
    } else {
        saveWrongQuestion(q.id);
    }

    // 修改：存入陣列的指定位置
    answers[current] = {
        question: q.question,
        options:  q.options,
        selected: [...selected],
        correct:  [...correct],
        topic:    q.topic,
        isCorrect,
        originalIndex: current,
    };

    setTimeout(() => {
        current++;
        if (current < questions.length) renderQuestion();
        else showResult();
    }, 900);
}

/* 結果畫面 */
function showResult() {
    showScreen('result');
    const keys    = ['A','B','C','D','E','F'];
    const totalQuestions = questions.length;
    // 修改：過濾掉 null 的項目來統計
    const validAnswers = answers.filter(a => a !== null);
    const answeredCount = validAnswers.length;
    const correctCount = validAnswers.filter(a => a.isCorrect).length;

    document.getElementById('score-number').textContent = `${correctCount} / ${answeredCount}`;

    // 處理結果訊息
    const msgEl = document.getElementById('result-message');
    const cancelBtn = document.getElementById('cancel-redirect-btn');
    msgEl.textContent = '';
    cancelBtn.style.display = 'none';
    if (redirectTimer) {
        clearTimeout(redirectTimer);
        redirectTimer = null;
    }

    if (answeredCount === 0) {
        msgEl.textContent = '後悔了嗎？';
    } else {
        const accuracy = correctCount / answeredCount;
        if (accuracy < 0.5) {
            msgEl.textContent = '你還是去當兵吧';
            cancelBtn.style.display = 'inline-block';
            let secondsLeft = 5;
            cancelBtn.textContent = `我不要當兵 (${secondsLeft}s)`;
            
            const countdown = () => {
                secondsLeft--;
                if (secondsLeft > 0) {
                    cancelBtn.textContent = `我不要當兵 (${secondsLeft}s)`;
                    redirectTimer = setTimeout(countdown, 1000);
                } else {
                    window.location.href = "https://www.mnd.gov.tw/";
                }
            };
            redirectTimer = setTimeout(countdown, 1000);
            
            cancelBtn.onclick = () => {
                clearTimeout(redirectTimer);
                redirectTimer = null;
                cancelBtn.style.display = 'none';
                msgEl.textContent = '你選擇了勇敢面對挑戰！';
            };
        }
    }

    // 弱點分析
    const stats = {};
    validAnswers.forEach(a => {
        if (!a.topic) return;
        if (!stats[a.topic]) stats[a.topic] = { total: 0, ok: 0 };
        stats[a.topic].total++;
        if (a.isCorrect) stats[a.topic].ok++;
    });

    const topicList = Object.keys(stats);
    if (topicList.length > 0) {
        document.getElementById('weakness-analysis').style.display = 'block';
        document.getElementById('weakness-list').innerHTML = topicList.map(name => {
            const s = stats[name];
            const rate = Math.round((s.ok / s.total) * 100);
            return `
                <div class="weakness-item">
                    <div class="weakness-name">${name}</div>
                    <div class="weakness-bar-bg"><div class="weakness-bar-fg" style="width:${rate}%"></div></div>
                    <div class="weakness-score">${rate}%</div>
                </div>
            `;
        }).join('');
    } else {
        document.getElementById('weakness-analysis').style.display = 'none';
    }

    const wrongAnswers = validAnswers.filter(a => !a.isCorrect);
    const correctAnswers = validAnswers.filter(a => a.isCorrect);

    const renderItem = (a) => `
        <div class="result-item ${a.isCorrect ? 'ok' : 'fail'}">
            <div class="ri-q">
                <span>第 ${a.originalIndex + 1} 題</span>
                <span class="ri-topic">${a.topic || ''}</span>
            </div>
            <div>${a.question}</div>
            <div class="ri-status">
                ${a.isCorrect
                    ? '✓ 答對'
                    : `✗ 答錯 ── 正確：${a.correct.map(c => keys[c]).join('、')}　你選了：${a.selected.map(c => keys[c]).join('、') || '（未作答）'}`
                }
            </div>
        </div>
    `;

    let resultHtml = wrongAnswers.map(renderItem).join('');

    if (correctAnswers.length > 0) {
        resultHtml += `
            <div class="correct-answers-section" id="correct-answers-section">
                <div class="correct-answers-header" id="correct-answers-header">
                    <span>顯示答對題目 (${correctAnswers.length})</span>
                </div>
                <div class="correct-answers-content">
                    ${correctAnswers.map(renderItem).join('')}
                </div>
            </div>
        `;
    }

    if (answeredCount < totalQuestions) {
        resultHtml += `<p class="toast">（提前退出，未完成其餘 ${totalQuestions - answeredCount} 題）</p>`;
    }

    const resultListEl = document.getElementById('result-list');
    resultListEl.innerHTML = resultHtml;

    // 绑定收摺事件
    const correctHeader = document.getElementById('correct-answers-header');
    if (correctHeader) {
        correctHeader.onclick = () => {
            document.getElementById('correct-answers-section').classList.toggle('active');
        };
    }

    document.getElementById('retry-btn').onclick = () => {
        if (redirectTimer) {
            clearTimeout(redirectTimer);
            redirectTimer = null;
        }
        questions = shuffle(questions);
        current = 0; answers = [];
        showScreen('quiz');
        renderQuestion();
    };
    document.getElementById('back-btn').onclick = init;
}

/* 工具：隨機排序 */
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

init();
</script>
</body>
</html>
